<?xml version="1.0" encoding="UTF-8"?>
<!-- 左开门 (铰链在左下角, 向内(上)开启90°)
     宽度 = 900mm (门洞), 深度 = 900mm (弧线半径=门扇长度)
     viewBox 的坐标: 墙体在 y=100 附近, 门扇和弧线向上 (y 减小) -->
<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 120 120">
  <!-- 墙体（门洞两侧）-->
  <rect x="0"   y="100" width="15"  height="12" fill="#2c2c2c"/>
  <rect x="105" y="100" width="15"  height="12" fill="#2c2c2c"/>
  <!-- 门洞（白色覆盖）-->
  <rect x="15" y="100" width="90" height="12" fill="#ffffff"/>

  <!-- 开启弧线 (以左铰链为圆心, 半径=门扇长度=90, 从 0° 到 -90°) -->
  <path d="M 105 106 A 90 90 0 0 0 15 16"
        fill="none" stroke="#2c2c2c" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- 门扇 (从铰链点垂直向上) -->
  <line x1="15" y1="106" x2="15" y2="16" stroke="#2c2c2c" stroke-width="3" stroke-linecap="round"/>

  <!-- 铰链标记 (小圆点) -->
  <circle cx="15" cy="106" r="2.5" fill="#2c2c2c"/>
</svg>
