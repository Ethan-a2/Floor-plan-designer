<?xml version="1.0" encoding="UTF-8"?>
<!-- 滑动玻璃门 (两扇左右错位, 带轨道)
     总宽 1800mm, 每扇 900mm, 厚度约 40mm -->
<svg xmlns="http://www.w3.org/2000/svg" width="220" height="60" viewBox="0 0 220 60">
  <!-- 墙体 (两端) -->
  <rect x="0"   y="20" width="15"  height="12" fill="#2c2c2c"/>
  <rect x="205" y="20" width="15"  height="12" fill="#2c2c2c"/>

  <!-- 外轨 (上) -->
  <line x1="15" y1="20" x2="205" y2="20" stroke="#2c2c2c" stroke-width="1"/>
  <!-- 内轨 (下) -->
  <line x1="15" y1="32" x2="205" y2="32" stroke="#2c2c2c" stroke-width="1"/>

  <!-- 左扇 玻璃门 (在外轨, 偏上) -->
  <rect x="20" y="16" width="95" height="7" fill="#c8e0f0" stroke="#5a8fb0" stroke-width="0.8"/>
  <!-- 玻璃花纹 -->
  <line x1="25" y1="19.5" x2="110" y2="19.5" stroke="#ffffff" stroke-width="1" opacity="0.8"/>

  <!-- 右扇 玻璃门 (在内轨, 偏下, 与左扇重叠区 95~110) -->
  <rect x="105" y="29" width="95" height="7" fill="#c8e0f0" stroke="#5a8fb0" stroke-width="0.8"/>
  <line x1="110" y1="32.5" x2="195" y2="32.5" stroke="#ffffff" stroke-width="1" opacity="0.8"/>

  <!-- 滑动方向箭头 (↔) -->
  <g stroke="#2c2c2c" stroke-width="1" fill="none">
    <line x1="55" y1="48" x2="165" y2="48"/>
    <polyline points="60,45 55,48 60,51"/>
    <polyline points="160,45 165,48 160,51"/>
  </g>
</svg>
