<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>户型设计器 Floor Planner</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
body { font-family: "Microsoft YaHei","PingFang SC","Segoe UI",sans-serif; height: 100vh; overflow: hidden; background:#f5f6f8; color:#333; font-size:13px;}

/* ===== 顶栏 ===== */
.topbar { height:46px; background:#fff; display:flex; align-items:center; padding:0 14px; gap:6px; border-bottom:1px solid #e5e7eb; box-shadow: 0 1px 2px rgba(0,0,0,0.04);}
.topbar .title { font-weight:600; font-size:15px; color:#1f2937; margin-right:18px;}
.topbar button { background:transparent; color:#4b5563; border:1px solid transparent; padding:5px 10px; border-radius:4px; cursor:pointer; font-size:12px; transition: all 0.1s;}
.topbar button:hover { background:#f3f4f6; color:#111;}
.topbar .sep { width:1px; height:22px; background:#e5e7eb; margin:0 4px;}
.topbar .grow { flex:1;}
.topbar .btn-primary { background:#3b82f6; color:#fff; border-color:#3b82f6;}
.topbar .btn-primary:hover { background:#2563eb; color:#fff;}

/* ===== 楼层栏 ===== */
.floorbar { height:36px; background:#fafafa; border-bottom:1px solid #e5e7eb; display:flex; align-items:center; padding:0 14px; gap:6px;}
.fb-label { color:#6b7280; font-size:12px; margin-right:4px;}
.floor-tabs { display:flex; gap:2px; flex:1; overflow-x:auto;}
.floor-tab { padding:4px 14px; background:#fff; border:1px solid #e5e7eb; color:#4b5563; border-radius:4px; cursor:pointer; font-size:12px; white-space:nowrap;}
.floor-tab:hover { background:#f3f4f6;}
.floor-tab.active { background:#3b82f6; border-color:#3b82f6; color:#fff; font-weight:600;}
.fb-btn { background:#fff; color:#4b5563; border:1px solid #e5e7eb; padding:4px 10px; border-radius:4px; cursor:pointer; font-size:12px;}
.fb-btn:hover { background:#f3f4f6;}

/* ===== 主区 ===== */
.main { display:flex; height: calc(100vh - 46px - 36px - 28px);}

/* 左侧组件库 */
.sidebar { width:230px; background:#fff; border-right:1px solid #e5e7eb; overflow-y:auto; padding:10px;}
.sb-section { margin-bottom:8px;}
.sb-title { font-size:11px; color:#9ca3af; padding:6px 4px; letter-spacing:1px; text-transform:uppercase; font-weight:600;}
.sb-search { width:100%; padding:6px 10px; border:1px solid #e5e7eb; border-radius:4px; font-size:12px; margin-bottom:8px;}
.sb-search:focus { outline:none; border-color:#3b82f6;}
.cat { border-bottom:1px solid #f3f4f6;}
.cat-head { padding:8px 6px; cursor:pointer; font-weight:600; color:#374151; font-size:12px; display:flex; align-items:center; gap:6px;}
.cat-head:hover { background:#f9fafb;}
.cat-head .arrow { display:inline-block; width:10px; transition: transform 0.15s;}
.cat.open .cat-head .arrow { transform: rotate(90deg);}
.cat-body { display:none; padding:4px 2px 8px;}
.cat.open .cat-body { display:grid; grid-template-columns:1fr 1fr; gap:4px;}
.sb-item { background:#fafafa; border:1px solid #f3f4f6; border-radius:4px; padding:6px 2px; text-align:center; cursor:grab; transition:all .1s;}
.sb-item:hover { background:#fff; border-color:#3b82f6; box-shadow: 0 2px 4px rgba(59,130,246,0.15);}
.sb-item:active { cursor:grabbing;}
.sb-item svg { display:block; margin:0 auto 2px;}
.sb-item .lbl { font-size:10px; color:#6b7280; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}

/* 工具选择 */
.tool-row { display:grid; grid-template-columns:1fr 1fr; gap:3px;}
.tool-btn { padding:6px 4px; background:#fff; border:1px solid #e5e7eb; color:#374151; border-radius:4px; cursor:pointer; font-size:12px; transition: all 0.1s;}
.tool-btn:hover { background:#f3f4f6; border-color:#d1d5db;}
.tool-btn.active { background:#3b82f6; border-color:#3b82f6; color:#fff;}

/* 中间画布区 */
.canvas-wrap { flex:1; position:relative; overflow:hidden; background:#fafafa;}
#canvas { width:100%; height:100%; cursor: crosshair; display:block;}
#canvas.tool-select { cursor: default;}
#canvas.dragging { cursor: grabbing;}

/* 右侧属性面板 */
.props { width:260px; background:#fff; border-left:1px solid #e5e7eb; overflow-y:auto; padding:14px;}
.props h3 { font-size:13px; color:#111; margin-bottom:10px; padding-bottom:8px; border-bottom:1px solid #e5e7eb; font-weight:600;}
.prop-row { display:flex; align-items:center; margin-bottom:8px; font-size:12px;}
.prop-row label { width:70px; color:#6b7280;}
.prop-row input, .prop-row select, .prop-row textarea {
    flex:1; background:#fff; border:1px solid #e5e7eb; color:#111; padding:5px 7px; border-radius:3px; font-size:12px;
}
.prop-row input:focus, .prop-row select:focus { outline:none; border-color:#3b82f6;}
.prop-row input[type="color"] { padding:2px; height:26px;}
.prop-row input[type="checkbox"] { flex:none; margin-left:0;}
.empty-hint { color:#9ca3af; font-size:12px; text-align:center; padding:30px 10px; line-height:1.8;}

/* 底栏 */
.statusbar { height:28px; background:#fff; display:flex; align-items:center; padding:0 14px; font-size:11px; color:#6b7280; border-top:1px solid #e5e7eb; gap:18px;}
.statusbar span.v { color:#111;}
.statusbar .zoom-slider { margin-left:auto; display:flex; align-items:center; gap:6px;}
.statusbar .zoom-slider input[type=range] { width:140px;}
.statusbar .zoom-btn { background:transparent; border:none; cursor:pointer; color:#6b7280; padding:2px 6px; font-size:14px;}
.statusbar .zoom-btn:hover { color:#111;}

/* 浮动尺寸标签 */
.dim-tooltip { position:absolute; background:#1f2937; color:#fff; padding:4px 8px; font-size:11px; border-radius:3px; pointer-events:none; white-space:nowrap; z-index:100; box-shadow:0 2px 6px rgba(0,0,0,0.15);}

/* 模态 */
.modal-bg { position:fixed; inset:0; background:rgba(0,0,0,0.4); display:none; align-items:center; justify-content:center; z-index:1000;}
.modal-bg.show { display:flex;}
.modal { background:#fff; padding:24px; border-radius:8px; min-width:320px; max-width:520px; box-shadow:0 10px 40px rgba(0,0,0,0.2);}
.modal h3 { margin-bottom:14px; color:#111;}
.modal button { margin-top:10px; padding:6px 16px; background:#3b82f6; border:none; color:#fff; border-radius:4px; cursor:pointer;}
.modal textarea { width:100%; min-height:180px; background:#fafafa; color:#111; border:1px solid #e5e7eb; padding:10px; font-family:monospace; font-size:11px; border-radius:4px;}

/* 迷你地图 */
.minimap { position:absolute; right:12px; bottom:12px; width:160px; height:120px; background:rgba(255,255,255,0.95); border:1px solid #d1d5db; border-radius:4px; overflow:hidden; box-shadow:0 2px 8px rgba(0,0,0,0.1); cursor:crosshair;}
.minimap svg { display:block; width:100%; height:100%;}
</style>
</head>
<body>

<!-- 顶栏 -->
<div class="topbar">
    <div class="title">🏠 户型设计器</div>
    <button onclick="app.undo()" title="Ctrl+Z">↶ 撤销</button>
    <button onclick="app.redo()" title="Ctrl+Y">↷ 重做</button>
    <div class="sep"></div>
    <button onclick="app.duplicate()" title="Ctrl+C / Ctrl+D">📋 复制</button>
    <button onclick="app.deleteSelected()" title="Delete">🗑 删除</button>
    <button onclick="app.rotateSelected()" title="R">⟳ 旋转90°</button>
    <div class="sep"></div>
    <button onclick="app.zoomIn()">🔍+</button>
    <button onclick="app.zoomOut()">🔍-</button>
    <button onclick="app.zoomFit()">适应窗口</button>
    <div class="sep"></div>
    <label style="font-size:12px;"><input type="checkbox" id="snapChk" checked onchange="app.snapEnabled=this.checked"> 吸附网格</label>
    <button onclick="app.toggleDimensions()" id="btnDim" title="自动在外墙四周生成尺寸链">📏 尺寸标注</button>
    <div class="sep"></div>
    <button onclick="app.importBackground()" title="导入图片/SVG 作为底图(置底、半透明，适合描图)">🖼 底图</button>
    <button onclick="app.importImageComponent()" title="导入 PNG/JPG 作为组件">📎 图片</button>
    <button onclick="app.importSvgComponent()" title="导入 SVG 作为矢量组件">🎨 SVG</button>
    <button onclick="app.calibrateBackground()" id="btnCalib" title="两点标定：按已知距离缩放图像对象到真实尺寸">📐 标定</button>
    <div class="grow"></div>
    <button onclick="app.newProject()">🆕 新建</button>
    <button onclick="app.openLoadDlg()">📂 加载</button>
    <button onclick="app.saveJSON()">💾 保存JSON</button>
    <button class="btn-primary" onclick="app.exportSVG()">⬇ 导出SVG</button>
    <button class="btn-primary" onclick="app.exportDXF()">⬇ 导出DXF</button>
</div>

<!-- 楼层栏 -->
<div class="floorbar">
    <span class="fb-label">楼层:</span>
    <div class="floor-tabs" id="floorTabs"></div>
    <button class="fb-btn" onclick="app.addFloor(false)" title="新建空白楼层">＋ 新楼层</button>
    <button class="fb-btn" onclick="app.addFloor(true)" title="复制当前楼层结构(墙/门/窗)">⎘ 复制当前</button>
    <button class="fb-btn" onclick="app.renameFloor()" title="重命名">✎ 重命名</button>
    <button class="fb-btn" style="color:#e88;" onclick="app.deleteFloor()" title="删除当前楼层">🗑 删除</button>
</div>

<div class="main">
    <!-- 左侧: 工具+组件库 -->
    <div class="sidebar">
        <div class="sb-section">
            <div class="sb-title">工具</div>
            <div class="tool-row">
                <button class="tool-btn active" data-tool="select" onclick="app.setTool('select')">↖ 选择</button>
                <button class="tool-btn" data-tool="wall" onclick="app.setTool('wall')">▭ 墙</button>
                <button class="tool-btn" data-tool="room" onclick="app.setTool('room')">⬜ 房间</button>
                <button class="tool-btn" data-tool="room-l" onclick="app.setTool('room-l')">L 型</button>
                <button class="tool-btn" data-tool="room-t" onclick="app.setTool('room-t')">T 型</button>
                <button class="tool-btn" data-tool="door" onclick="app.setTool('door')">🚪 门</button>
                <button class="tool-btn" data-tool="window" onclick="app.setTool('window')">🪟 窗</button>
                <button class="tool-btn" data-tool="stairs" onclick="app.setTool('stairs')">📶 楼梯</button>
                <button class="tool-btn" data-tool="text" onclick="app.setTool('text')">T 文字</button>
                <button class="tool-btn" data-tool="measure" onclick="app.setTool('measure')" title="点两点测量距离 · Esc 清除">📏 皮尺</button>
                <button class="tool-btn" data-tool="rect" onclick="app.setTool('rect')" title="拖出带填充色的矩形 (地板/房间着色)">⎕ 地板</button>
            </div>
        </div>

        <div class="sb-section">
            <div class="sb-title">图形库</div>
            <input type="text" class="sb-search" id="sbSearch" placeholder="🔍 搜索家具..." oninput="app.filterFurniture(this.value)">
            <div id="furnitureList"></div>
        </div>
    </div>

    <!-- 画布 -->
    <div class="canvas-wrap">
        <svg id="canvas" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
                    <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#eef0f3" stroke-width="0.5"/>
                </pattern>
                <pattern id="gridBig" width="250" height="250" patternUnits="userSpaceOnUse">
                    <path d="M 250 0 L 0 0 0 250" fill="none" stroke="#d7dae0" stroke-width="1"/>
                </pattern>
            </defs>
            <g id="viewport">
                <rect id="gridBg" x="-5000" y="-5000" width="10000" height="10000" fill="url(#grid)"/>
                <rect x="-5000" y="-5000" width="10000" height="10000" fill="url(#gridBig)"/>
                <g id="layer-objects"></g>
                <g id="layer-overlay"></g>
            </g>
        </svg>
        <div class="dim-tooltip" id="tip" style="display:none;"></div>
        <div class="minimap" id="minimap">
            <svg id="minimapSvg" viewBox="0 0 160 120"></svg>
        </div>
    </div>

    <!-- 右侧属性面板 -->
    <div class="props" id="props">
        <h3>属性</h3>
        <div class="empty-hint">未选中对象<br><br>📌 快速上手<br>• 左侧工具：房间/L型/T型 一键画<br>• 图形库：拖拽到画布<br>• 滚轮缩放 · 中键/Space 平移<br>• 选中后看到到墙的相对距离<br>• 📏 按钮 = 外墙自动尺寸标注<br>• Delete删除 · Ctrl+D复制 · R旋转</div>
    </div>
</div>

<!-- 底栏 -->
<div class="statusbar">
    <span>工具: <span class="v" id="stTool">选择</span></span>
    <span>坐标: <span class="v" id="stCoord">0, 0</span> mm</span>
    <span>对象: <span class="v" id="stCount">0</span></span>
    <span>图形: <span class="v" id="stShapes">0</span></span>
    <span id="stMeasure" style="display:none;color:#dc2626;">
        📏 <span class="v" style="color:#dc2626;" id="stMeasureText">--</span>
        <button onclick="app.clearMeasures()" style="margin-left:8px;background:none;border:1px solid #dc2626;color:#dc2626;padding:1px 6px;border-radius:3px;cursor:pointer;font-size:10px;" title="删除所有测量线">清除全部</button>
    </span>
    <div class="zoom-slider">
        <button class="zoom-btn" onclick="app.zoomFit()" title="适应窗口">⛶</button>
        <button class="zoom-btn" onclick="app.zoomOut()">−</button>
        <input type="range" min="10" max="400" value="100" id="zoomRange" oninput="app.setZoom(this.value/100)">
        <button class="zoom-btn" onclick="app.zoomIn()">+</button>
        <span class="v" id="stZoom" style="min-width:40px;">100%</span>
    </div>
</div>

<!-- 加载对话框 -->
<div class="modal-bg" id="loadDlg">
    <div class="modal">
        <h3>加载项目 JSON</h3>
        <textarea id="loadText" placeholder="粘贴JSON内容 或 点击选择文件"></textarea>
        <div style="margin-top:10px;">
            <input type="file" id="loadFile" accept=".json">
            <button onclick="app.loadFromText()">加载</button>
            <button onclick="document.getElementById('loadDlg').classList.remove('show')" style="background:#555;">取消</button>
        </div>
    </div>
</div>

<script>
/* ============================================================
   Floor Planner -- 单文件实现
   坐标系: SVG 用户单位 = 10 mm (即 1px = 10mm, 1m = 100px)
   ============================================================ */

const MM_PER_UNIT = 10;           // 1 user-unit = 10 mm
const GRID = 10;                  // 吸附步长 user units (=100mm)

const app = {
    floors: [{ name:'1F', objects:[] }],  // 楼层列表
    currentFloor: 0,                       // 当前楼层索引
    get objects() { return this.floors[this.currentFloor].objects; },
    set objects(v) { this.floors[this.currentFloor].objects = v; },

    selected: null,               // 选中对象
    nextId: 1,
    tool: 'select',
    snapEnabled: true,
    showDims: false,              // 是否显示自动尺寸标注
    viewport: { x: 0, y: 0, zoom: 1 },
    history: [],
    historyIdx: -1,
    drawing: null,                // 正在绘制的临时对象
    dragState: null,              // 拖动状态
    measuring: null,              // 正在画的测量线预览 (不在 objects 中, 第二次点击时加入)

    init() {
        this.svg = document.getElementById('canvas');
        this.vp = document.getElementById('viewport');
        this.layerObj = document.getElementById('layer-objects');
        this.layerOv = document.getElementById('layer-overlay');
        this.tip = document.getElementById('tip');

        this.buildFurnitureList();
        this.renderFloorTabs();
        this.bindEvents();
        this.updateViewport();
        this.pushHistory();
        this.render();
    },

    /* ========== 楼层管理 ========== */
    renderFloorTabs() {
        const box = document.getElementById('floorTabs');
        box.innerHTML = '';
        this.floors.forEach((f, i) => {
            const tab = document.createElement('div');
            tab.className = 'floor-tab' + (i===this.currentFloor ? ' active' : '');
            tab.textContent = f.name;
            tab.onclick = () => this.switchFloor(i);
            box.appendChild(tab);
        });
    },
    switchFloor(i) {
        if (i < 0 || i >= this.floors.length || i === this.currentFloor) return;
        this.currentFloor = i;
        this.select(null);
        this.renderFloorTabs();
        this.render();
    },
    addFloor(copyCurrent) {
        const n = this.floors.length + 1;
        const name = (n) + 'F';
        let objs = [];
        if (copyCurrent) {
            // 只复制结构性对象 (墙/门/窗/楼梯), 不复制家具和文字
            const src = this.objects.filter(o => ['wall','door','window','stairs','rect'].includes(o.type));
            objs = JSON.parse(JSON.stringify(src));
            objs.forEach(o => o.id = this.nextId++);
        }
        this.floors.push({ name, objects: objs });
        this.currentFloor = this.floors.length - 1;
        this.select(null);
        this.renderFloorTabs();
        this.render();
        this.pushHistory();
    },
    deleteFloor() {
        if (this.floors.length <= 1) { alert('至少保留一层'); return; }
        if (!confirm(`删除楼层 "${this.floors[this.currentFloor].name}"?`)) return;
        this.floors.splice(this.currentFloor, 1);
        if (this.currentFloor >= this.floors.length) this.currentFloor = this.floors.length - 1;
        this.select(null);
        this.renderFloorTabs();
        this.render();
        this.pushHistory();
    },
    renameFloor() {
        const cur = this.floors[this.currentFloor];
        const nv = prompt('楼层名称:', cur.name);
        if (nv) { cur.name = nv; this.renderFloorTabs(); this.pushHistory(); }
    },

    /* ========== 图像对象 (底图 / 自定义组件) ========== */

    // 通用图像上传。placement: 'back' = 置底(描图); 'current' = 当前层 push
    _uploadImage(opts) {
        const { accept, placement = 'current', defaultOpacity = 1, asSvg = false } = opts || {};
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = accept;
        input.onchange = e => {
            const file = e.target.files && e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = ev => {
                if (asSvg) {
                    // SVG 用 text 解析 + 包成 data URL
                    const svgText = ev.target.result;
                    // 简单抽取 viewBox 或 width/height 求原始尺寸
                    const wMatch = svgText.match(/width\s*=\s*["']?([\d.]+)/);
                    const hMatch = svgText.match(/height\s*=\s*["']?([\d.]+)/);
                    const vbMatch = svgText.match(/viewBox\s*=\s*["']?([-\d.\s]+)/);
                    let naturalW = 100, naturalH = 100;
                    if (wMatch && hMatch) {
                        naturalW = parseFloat(wMatch[1]);
                        naturalH = parseFloat(hMatch[1]);
                    } else if (vbMatch) {
                        const parts = vbMatch[1].trim().split(/\s+/).map(Number);
                        if (parts.length === 4) { naturalW = parts[2]; naturalH = parts[3]; }
                    }
                    const src = 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svgText)));
                    this._placeImageObject({ type:'svg', src, w:naturalW, h:naturalH, fileName:file.name, placement, defaultOpacity });
                } else {
                    // 栅格图像
                    const img = new Image();
                    img.onload = () => {
                        let src = ev.target.result;
                        const maxDim = 2000;
                        if (file.size > 1024 * 1024 || img.naturalWidth > maxDim || img.naturalHeight > maxDim) {
                            const scale = Math.min(1, maxDim / Math.max(img.naturalWidth, img.naturalHeight));
                            const cv = document.createElement('canvas');
                            cv.width  = Math.round(img.naturalWidth * scale);
                            cv.height = Math.round(img.naturalHeight * scale);
                            cv.getContext('2d').drawImage(img, 0, 0, cv.width, cv.height);
                            src = cv.toDataURL('image/jpeg', 0.8);
                        }
                        this._placeImageObject({ type:'image', src, w:img.naturalWidth, h:img.naturalHeight, fileName:file.name, placement, defaultOpacity });
                    };
                    img.onerror = () => alert('图片加载失败');
                    img.src = ev.target.result;
                }
            };
            if (asSvg) reader.readAsText(file);
            else reader.readAsDataURL(file);
        };
        input.click();
    },

    _placeImageObject({ type, src, w, h, fileName, placement, defaultOpacity }) {
        const vp = this.viewport;
        const cx = (this.svg.clientWidth/2 - vp.x) / vp.zoom;
        const cy = (this.svg.clientHeight/2 - vp.y) / vp.zoom;
        const obj = {
            id: this.nextId++,
            type,
            src,
            x: this.snap(cx - w/2), y: this.snap(cy - h/2),
            w, h,
            rot: 0,
            opacity: defaultOpacity,
            visible: true,
            name: fileName ? fileName.replace(/\.[^.]+$/, '') : (placement === 'back' ? '底图' : '组件')
        };
        if (placement === 'back') this.objects.unshift(obj);
        else this.objects.push(obj);

        this.selected = obj;
        this.render();
        this.pushHistory();
        this.updatePropsPanel();

        // 柔性提示
        setTimeout(() => {
            const text = placement === 'back'
                ? '底图已导入：拖动/缩放 · 点 📐 按真实尺寸标定'
                : `已添加${type === 'svg' ? ' SVG ' : '图片'}组件：拖动/缩放 · R 旋转`;
            this.tip.textContent = text;
            this.tip.style.left = '50%';
            this.tip.style.top = '80px';
            this.tip.style.transform = 'translateX(-50%)';
            this.tip.style.display = 'block';
            setTimeout(() => {
                this.tip.style.display = 'none';
                this.tip.style.transform = '';
            }, 3500);
        }, 50);
    },

    // 导入为底图 (置底，半透明)

    // 两点标定：选中的 image/svg 对象会被按实际距离缩放。
    // 如果没选中 image/svg，会退化为找当前层最底部的 image 对象
    calibrateBackground() {
        let target = this.selected;
        if (!target || (target.type !== 'image' && target.type !== 'svg')) {
            // 找当前层第一个 image 或 svg 作为默认
            target = this.objects.find(o => o.type === 'image' || o.type === 'svg');
        }
        if (!target) { alert('请先导入底图，或选中一个图像/SVG 组件'); return; }

        alert('请在图像上依次点击两个已知距离的端点');
        const prevTool = this.tool;
        this.setTool('select');
        this._calibPts = [];
        this.svg.style.cursor = 'crosshair';
        const btn = document.getElementById('btnCalib');
        if (btn) { btn.style.background = '#f59e0b'; btn.style.color = '#fff'; }

        const handler = e => {
            if (e.button !== 0) return;
            e.stopPropagation(); e.preventDefault();
            const p = this.clientToWorld(e.clientX, e.clientY);
            this._calibPts.push(p);

            const ns = 'http://www.w3.org/2000/svg';
            const mark = document.createElementNS(ns, 'circle');
            mark.setAttribute('cx', p.x); mark.setAttribute('cy', p.y);
            mark.setAttribute('r', 6 / this.viewport.zoom);
            mark.setAttribute('fill', '#f59e0b');
            mark.setAttribute('stroke', '#fff');
            mark.setAttribute('stroke-width', 2 / this.viewport.zoom);
            this.layerOv.appendChild(mark);

            if (this._calibPts.length === 2) {
                const [a, b] = this._calibPts;
                const ln = document.createElementNS(ns, 'line');
                ln.setAttribute('x1', a.x); ln.setAttribute('y1', a.y);
                ln.setAttribute('x2', b.x); ln.setAttribute('y2', b.y);
                ln.setAttribute('stroke', '#f59e0b');
                ln.setAttribute('stroke-width', 2 / this.viewport.zoom);
                ln.setAttribute('stroke-dasharray', '4,3');
                this.layerOv.appendChild(ln);

                this.svg.removeEventListener('click', handler, true);
                this.svg.style.cursor = '';
                if (btn) { btn.style.background = ''; btn.style.color = ''; }

                const pixLen = Math.hypot(b.x - a.x, b.y - a.y);
                const currentMm = Math.round(pixLen * MM_PER_UNIT);
                const mmStr = prompt(
                    `两点的图上距离当前是 ${currentMm} mm\n请输入实际距离 (mm):`,
                    String(currentMm)
                );
                this.render();
                if (!mmStr) { this.setTool(prevTool); return; }
                const mm = +mmStr;
                if (!mm || mm < 1) { alert('无效数值'); this.setTool(prevTool); return; }

                const scale = (mm / MM_PER_UNIT) / pixLen;
                const ax = a.x, ay = a.y;
                target.x = ax + (target.x - ax) * scale;
                target.y = ay + (target.y - ay) * scale;
                target.w *= scale;
                target.h *= scale;

                this.render();
                this.pushHistory();
                this.updatePropsPanel();
                alert(`已按 ${mm}mm 校准 (缩放比例 ${scale.toFixed(4)})`);
                this.setTool(prevTool);
            }
        };
        this.svg.addEventListener('click', handler, true);
        const cancel = ke => {
            if (ke.key === 'Escape') {
                this.svg.removeEventListener('click', handler, true);
                this.svg.style.cursor = '';
                if (btn) { btn.style.background = ''; btn.style.color = ''; }
                document.removeEventListener('keydown', cancel, true);
                this.render();
                this.setTool(prevTool);
            }
        };
        document.addEventListener('keydown', cancel, true);
    },

    /* ========== 图层顺序 ========== */
    bringToFront() {
        const o = this.selected; if (!o) return;
        const i = this.objects.indexOf(o); if (i < 0 || i === this.objects.length-1) return;
        this.objects.splice(i, 1);
        this.objects.push(o);
        this.render(); this.pushHistory();
    },
    sendToBack() {
        const o = this.selected; if (!o) return;
        const i = this.objects.indexOf(o); if (i <= 0) return;
        this.objects.splice(i, 1);
        this.objects.unshift(o);
        this.render(); this.pushHistory();
    },
    raiseOne() {
        const o = this.selected; if (!o) return;
        const i = this.objects.indexOf(o); if (i < 0 || i === this.objects.length-1) return;
        [this.objects[i], this.objects[i+1]] = [this.objects[i+1], this.objects[i]];
        this.render(); this.pushHistory();
    },
    lowerOne() {
        const o = this.selected; if (!o) return;
        const i = this.objects.indexOf(o); if (i <= 0) return;
        [this.objects[i], this.objects[i-1]] = [this.objects[i-1], this.objects[i]];
        this.render(); this.pushHistory();
    },
