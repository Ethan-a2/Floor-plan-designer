    buildFurnitureList() {
        const list = document.getElementById('furnitureList');
        list.innerHTML = '';
        this.CATEGORIES.forEach(cat => {
            const items = this.FURNITURE.filter(f => f.cat === cat.id);
            if (items.length === 0) return;
            const box = document.createElement('div');
            box.className = 'cat' + (cat.open ? ' open' : '');
            box.dataset.cat = cat.id;
            box.innerHTML = `<div class="cat-head"><span class="arrow">▶</span>${cat.name} <span style="color:#9ca3af;font-weight:400;">(${items.length})</span></div><div class="cat-body"></div>`;
            const body = box.querySelector('.cat-body');
            items.forEach(f => {
                const el = document.createElement('div');
                el.className = 'sb-item';
                el.draggable = true;
                el.dataset.fid = f.id;
                el.title = `${f.name}  ${f.w}×${f.h}mm`;
                el.innerHTML = `<svg width="46" height="32" viewBox="0 0 46 32">${miniIcon(f.icon)}</svg><div class="lbl">${f.name}</div>`;
                el.addEventListener('dragstart', e => { e.dataTransfer.setData('fid', f.id); });
                body.appendChild(el);
            });
            box.querySelector('.cat-head').addEventListener('click', () => {
                box.classList.toggle('open');
            });
            list.appendChild(box);
        });
        document.getElementById('stShapes').textContent = this.FURNITURE.length;
    },

    filterFurniture(q) {
        q = (q||'').trim().toLowerCase();
        document.querySelectorAll('.cat').forEach(cat => {
            let hit = 0;
            cat.querySelectorAll('.sb-item').forEach(item => {
                const fid = item.dataset.fid;
                const f = this.FURNITURE.find(x => x.id === fid);
                const match = !q || f.name.toLowerCase().includes(q) || fid.includes(q);
                item.style.display = match ? '' : 'none';
                if (match) hit++;
            });
            cat.style.display = hit ? '' : 'none';
            if (q) cat.classList.add('open');
        });
    },

    /* ========== 事件绑定 ========== */
    bindEvents() {
        const svg = this.svg;

        // 拖入家具
        svg.addEventListener('dragover', e => e.preventDefault());
        svg.addEventListener('drop', e => {
            e.preventDefault();
            const fid = e.dataTransfer.getData('fid');
            if (!fid) return;
            const f = this.FURNITURE.find(x=>x.id===fid);
            if (!f) return;
            const p = this.clientToWorld(e.clientX, e.clientY);
            this.addFurniture(f, p.x, p.y);
        });

        // 鼠标
        svg.addEventListener('mousedown', e => this.onMouseDown(e));
        svg.addEventListener('mousemove', e => this.onMouseMove(e));
        svg.addEventListener('mouseup',   e => this.onMouseUp(e));
        svg.addEventListener('wheel',     e => this.onWheel(e), {passive:false});
        svg.addEventListener('dblclick',  e => this.onDblClick(e));

        // 键盘
        window.addEventListener('keydown', e => this.onKey(e));

        // 文件加载
        document.getElementById('loadFile').addEventListener('change', e => {
            const f = e.target.files[0]; if (!f) return;
            const r = new FileReader();
            r.onload = () => { document.getElementById('loadText').value = r.result; };
            r.readAsText(f);
        });

        // 窗口大小
        window.addEventListener('resize', () => this.updateViewport());

        // 迷你地图点击跳转
        const mm = document.getElementById('minimap');
        if (mm) {
            mm.addEventListener('mousedown', e => {
                e.stopPropagation();
                const rect = mm.getBoundingClientRect();
                const px = e.clientX - rect.left;
                const py = e.clientY - rect.top;
                const b = this.getBounds();
                const mmW = 160, mmH = 120, pad = 8;
                const scale = Math.min((mmW-pad*2)/(b.w||1), (mmH-pad*2)/(b.h||1));
                const wx = (px-pad)/scale + b.x;
                const wy = (py-pad)/scale + b.y;
                // 视口中心对齐到 (wx, wy)
                this.viewport.x = this.svg.clientWidth/2 - wx * this.viewport.zoom;
                this.viewport.y = this.svg.clientHeight/2 - wy * this.viewport.zoom;
                this.updateViewport();
            });
        }
    },

    /* ========== 坐标转换 ========== */
    clientToWorld(cx, cy) {
        const rect = this.svg.getBoundingClientRect();
        const x = (cx - rect.left - this.viewport.x) / this.viewport.zoom;
        const y = (cy - rect.top  - this.viewport.y) / this.viewport.zoom;
        return { x, y };
    },
    snap(v) {
        if (!this.snapEnabled) return v;
        return Math.round(v / GRID) * GRID;
    },
    snapPt(p) { return { x: this.snap(p.x), y: this.snap(p.y) }; },

    /* ========== 视口 ========== */
    updateViewport() {
        const vp = this.viewport;
        this.vp.setAttribute('transform', `translate(${vp.x},${vp.y}) scale(${vp.zoom})`);
        const pct = Math.round(vp.zoom*100);
        document.getElementById('stZoom').textContent = pct+'%';
        const rng = document.getElementById('zoomRange');
        if (rng) rng.value = Math.max(10, Math.min(400, pct));
        this.updateMinimap();
    },
    zoomIn() { this.zoomAt(1.25, this.svg.clientWidth/2, this.svg.clientHeight/2); },
    zoomOut(){ this.zoomAt(0.8, this.svg.clientWidth/2, this.svg.clientHeight/2); },
    setZoom(z) {
        const cx = this.svg.clientWidth/2, cy = this.svg.clientHeight/2;
        const vp = this.viewport;
        const wx = (cx - vp.x)/vp.zoom;
        const wy = (cy - vp.y)/vp.zoom;
        vp.zoom = Math.max(0.1, Math.min(10, +z));
        vp.x = cx - wx * vp.zoom;
        vp.y = cy - wy * vp.zoom;
        this.updateViewport();
    },
    updateMinimap() {
        const svg = document.getElementById('minimapSvg');
        if (!svg) return;
        const b = this.getBounds();
        const mmW = 160, mmH = 120, pad = 8;
        const scale = Math.min((mmW-pad*2)/(b.w||1), (mmH-pad*2)/(b.h||1));
        svg.innerHTML = '';
        // 对象缩略
        let content = '';
        this.objects.forEach(o => {
            if (o.type === 'wall') {
                content += `<line x1="${(o.x1-b.x)*scale+pad}" y1="${(o.y1-b.y)*scale+pad}" x2="${(o.x2-b.x)*scale+pad}" y2="${(o.y2-b.y)*scale+pad}" stroke="#333" stroke-width="1.5"/>`;
            } else if (o.type === 'furniture') {
                content += `<rect x="${(o.x-b.x)*scale+pad}" y="${(o.y-b.y)*scale+pad}" width="${o.w*scale}" height="${o.h*scale}" fill="#d9bc87" opacity="0.5"/>`;
            }
        });
        // 视口框
        const vp = this.viewport;
        const wMin = -vp.x / vp.zoom;
        const hMin = -vp.y / vp.zoom;
        const wMax = wMin + this.svg.clientWidth / vp.zoom;
        const hMax = hMin + this.svg.clientHeight / vp.zoom;
        const vx = Math.max(0, (wMin-b.x)*scale+pad);
        const vy = Math.max(0, (hMin-b.y)*scale+pad);
        const vw = Math.min(mmW-vx, (wMax-wMin)*scale);
        const vh = Math.min(mmH-vy, (hMax-hMin)*scale);
        content += `<rect x="${vx}" y="${vy}" width="${vw}" height="${vh}" fill="rgba(59,130,246,0.1)" stroke="#3b82f6" stroke-width="1"/>`;
        svg.innerHTML = content;
    },
    zoomAt(factor, cx, cy) {
        const vp = this.viewport;
        const wx = (cx - vp.x)/vp.zoom;
        const wy = (cy - vp.y)/vp.zoom;
        vp.zoom = Math.max(0.1, Math.min(10, vp.zoom * factor));
        vp.x = cx - wx * vp.zoom;
        vp.y = cy - wy * vp.zoom;
        this.updateViewport();
    },
    zoomFit() {
        if (this.objects.length === 0) {
            this.viewport = { x: this.svg.clientWidth/2, y: this.svg.clientHeight/2, zoom: 1 };
            this.updateViewport();
            return;
        }
        let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
        this.objects.forEach(o => {
            const b = this.bboxOf(o);
            if (!b) return;
            minX=Math.min(minX,b.x); minY=Math.min(minY,b.y);
            maxX=Math.max(maxX,b.x+b.w); maxY=Math.max(maxY,b.y+b.h);
        });
        const pad = 50;
        const w = maxX-minX + pad*2, h = maxY-minY + pad*2;
        const zw = this.svg.clientWidth/w, zh = this.svg.clientHeight/h;
        this.viewport.zoom = Math.min(zw, zh, 3);
        this.viewport.x = (this.svg.clientWidth - (maxX+minX)*this.viewport.zoom)/2;
        this.viewport.y = (this.svg.clientHeight - (maxY+minY)*this.viewport.zoom)/2;
        this.updateViewport();
    },

    /* ========== 工具 ========== */
    setTool(t) {
        this.tool = t;
        document.querySelectorAll('.tool-btn').forEach(b=>b.classList.toggle('active', b.dataset.tool===t));
        this.svg.className.baseVal = 'tool-'+t;
        document.getElementById('stTool').textContent = {
            select:'选择', wall:'墙', 'room':'矩形房间', 'room-l':'L型房间', 'room-t':'T型房间', door:'门', window:'窗', text:'文字', stairs:'楼梯', measure:'皮尺', rect:'地板'
        }[t] || t;
        if (t !== 'select') this.select(null);
        // 切换工具时只取消正在画的预览；已保存的测量是普通对象，不动
        if (t !== 'measure') { this.measuring = null; this.render(); }
    },

    /* ========== 鼠标事件 ========== */
    onMouseDown(e) {
        const p = this.clientToWorld(e.clientX, e.clientY);
        const sp = this.snapPt(p);

        // 平移视图: 中键 或 Space+左键
        if (e.button === 1 || (e.button === 0 && this.spaceDown)) {
            this.dragState = { type:'pan', startX: e.clientX, startY: e.clientY, vpX: this.viewport.x, vpY: this.viewport.y };
            this.svg.classList.add('dragging');
            e.preventDefault(); return;
        }

        if (e.button !== 0) return;

        if (this.tool === 'select') {
            // 点击空白 -> 取消选中
            const target = this.hitTest(p);
            if (target) {
                this.select(target);
                // 检查是否点击手柄
                const handle = this.hitHandle(p, target);
                if (handle) {
                    this.dragState = { type:'resize', obj:target, handle, start:p, orig: {...target} };
                } else if (target.type === 'wall' || target.type==='door' || target.type==='window' || target.type==='measure') {
                    this.dragState = { type:'move-end', obj:target, start:p, orig:{...target}, endpoint: this.pickEndpoint(p, target)};
                } else {
                    this.dragState = { type:'move', obj:target, start:p, orig:{x:target.x, y:target.y} };
                }
            } else {
                this.select(null);
                // 框选暂不做，直接平移
                this.dragState = { type:'pan', startX: e.clientX, startY: e.clientY, vpX: this.viewport.x, vpY: this.viewport.y };
                this.svg.classList.add('dragging');
            }
        }
        else if (this.tool === 'wall') {
            this.drawing = { type:'wall', x1:sp.x, y1:sp.y, x2:sp.x, y2:sp.y, thickness: 24, id: this.nextId++ };
        }
        else if (this.tool === 'door') {
            this.drawing = { type:'door', x1:sp.x, y1:sp.y, x2:sp.x, y2:sp.y, swing:'in', id:this.nextId++ };
        }
        else if (this.tool === 'window') {
            this.drawing = { type:'window', x1:sp.x, y1:sp.y, x2:sp.x, y2:sp.y, thickness:10, id:this.nextId++ };
        }
        else if (this.tool === 'stairs') {
            this.drawing = { type:'stairs', x:sp.x, y:sp.y, w:0, h:0, steps:10, dir:'up', rot:0, id:this.nextId++ };
        }
        else if (this.tool === 'rect') {
            // 默认下一个轮流切换的淡色: 浅黄/浅蓝/浅绿/浅粉/浅紫
            const palette = ['#fef3c7','#dbeafe','#dcfce7','#fce7f3','#ede9fe','#ffedd5'];
            const existingRects = this.objects.filter(o => o.type === 'rect').length;
            const color = palette[existingRects % palette.length];
            this.drawing = {
                type:'rect',
                x: sp.x, y: sp.y, w: 0, h: 0,
                color, opacity: 0.6,
                rot: 0,
                name: '',
                id: this.nextId++
            };
        }
        else if (this.tool === 'room' || this.tool === 'room-l' || this.tool === 'room-t') {
            this.drawing = { type:'room-preview', shape:this.tool, x:sp.x, y:sp.y, w:0, h:0 };
        }
        else if (this.tool === 'text') {
            const txt = prompt('输入文字内容:', '文字');
            if (txt) {
                this.addObject({ type:'text', x:sp.x, y:sp.y, text:txt, size:16, color:'#2c3e50', rot:0, id:this.nextId++ });
                this.setTool('select');
            }
        }
        else if (this.tool === 'measure') {
            // 第一次点 = 起点; 第二次点 = 终点并作为 object 保存
            if (!this.measuring) {
                this.measuring = { type:'measure', x1: sp.x, y1: sp.y, x2: sp.x, y2: sp.y };
            } else {
                const m = this.measuring;
                m.x2 = sp.x; m.y2 = sp.y;
                if (Math.hypot(m.x2-m.x1, m.y2-m.y1) >= GRID) {
                    const obj = {
                        id: this.nextId++,
                        type: 'measure',
                        x1: m.x1, y1: m.y1, x2: m.x2, y2: m.y2
                    };
                    this.objects.push(obj);
                    this.pushHistory();
                }
                this.measuring = null;
                this.render();
            }
            this.renderPreview();
        }
    },

    onMouseMove(e) {
        const p = this.clientToWorld(e.clientX, e.clientY);
        const sp = this.snapPt(p);
        document.getElementById('stCoord').textContent = `${Math.round(p.x*MM_PER_UNIT)}, ${Math.round(p.y*MM_PER_UNIT)}`;

        if (this.dragState) {
            const d = this.dragState;
            if (d.type === 'pan') {
                this.viewport.x = d.vpX + (e.clientX - d.startX);
                this.viewport.y = d.vpY + (e.clientY - d.startY);
                this.updateViewport();
            }
            else if (d.type === 'move') {
                const dx = sp.x - this.snap(d.start.x);
                const dy = sp.y - this.snap(d.start.y);
                d.obj.x = d.orig.x + dx;
                d.obj.y = d.orig.y + dy;
                this.render();
                this.updatePropsPanel();
            }
            else if (d.type === 'move-end') {
                const dx = sp.x - this.snap(d.start.x);
                const dy = sp.y - this.snap(d.start.y);
                if (d.endpoint === 1) {
                    d.obj.x1 = d.orig.x1 + dx; d.obj.y1 = d.orig.y1 + dy;
                } else if (d.endpoint === 2) {
                    d.obj.x2 = d.orig.x2 + dx; d.obj.y2 = d.orig.y2 + dy;
                } else {
                    d.obj.x1 = d.orig.x1 + dx; d.obj.y1 = d.orig.y1 + dy;
                    d.obj.x2 = d.orig.x2 + dx; d.obj.y2 = d.orig.y2 + dy;
                }
                this.render();
                this.showDim(d.obj);
                this.updatePropsPanel();
            }
            else if (d.type === 'resize') {
                const o = d.obj, orig = d.orig;
                const dx = sp.x - this.snap(d.start.x);
                const dy = sp.y - this.snap(d.start.y);
                // 图像对象按纵横比缩放（对角手柄），保持扫描图/SVG 不变形
                if ((o.type === 'image' || o.type === 'svg') && !e.shiftKey) {
                    const aspect = orig.w / orig.h;
                    // 用对角方向投影决定主缩放量
                    const signX = d.handle.includes('e') ? 1 : (d.handle.includes('w') ? -1 : 0);
                    const signY = d.handle.includes('s') ? 1 : (d.handle.includes('n') ? -1 : 0);
                    // 取 dx/dy 投影的较大者
                    const proj = Math.abs(dx) > Math.abs(dy*aspect) ? dx*signX : dy*signY*aspect;
                    const newW = Math.max(GRID, orig.w + proj);
                    const newH = newW / aspect;
                    if (signX > 0) o.w = newW;
                    else if (signX < 0) { o.x = orig.x + (orig.w - newW); o.w = newW; }
                    if (signY > 0) o.h = newH;
                    else if (signY < 0) { o.y = orig.y + (orig.h - newH); o.h = newH; }
                    // 纯边手柄(只 w 或只 h) 时仍按比例
                    if (signX === 0) { o.w = newW; if (signY !== 0) {/* y 已改 */} else o.x = orig.x + (orig.w-newW)/2; }
                    if (signY === 0) { o.h = newH; if (signX === 0) o.y = orig.y + (orig.h-newH)/2; }
                } else {
                    if (d.handle.includes('e')) o.w = Math.max(GRID, orig.w + dx);
                    if (d.handle.includes('s')) o.h = Math.max(GRID, orig.h + dy);
                    if (d.handle.includes('w')) { o.x = orig.x + dx; o.w = Math.max(GRID, orig.w - dx); }
                    if (d.handle.includes('n')) { o.y = orig.y + dy; o.h = Math.max(GRID, orig.h - dy); }
                }
                this.render();
                this.showDim(o);
                this.updatePropsPanel();
            }
        }
        else if (this.drawing) {
            const dr = this.drawing;
            if (dr.type === 'wall' || dr.type === 'door' || dr.type === 'window') {
                dr.x2 = sp.x; dr.y2 = sp.y;
                // 正交约束 (按住shift自由)
                if (!e.shiftKey) {
                    const dx = Math.abs(dr.x2 - dr.x1);
                    const dy = Math.abs(dr.y2 - dr.y1);
                    if (dx > dy) dr.y2 = dr.y1; else dr.x2 = dr.x1;
                }
            } else if (dr.type === 'stairs') {
                dr.w = Math.max(GRID, sp.x - dr.x);
                dr.h = Math.max(GRID, sp.y - dr.y);
            } else if (dr.type === 'rect') {
                // 支持向左/向上拖 (负宽高)，mouseUp 时规范化
                dr.w = sp.x - dr.x;
                dr.h = sp.y - dr.y;
            } else if (dr.type === 'room-preview') {
                dr.w = sp.x - dr.x;
                dr.h = sp.y - dr.y;
            }
            this.renderPreview();
            this.showDim(dr);
        }
        else if (this.measuring) {
            // 实时预览: 默认自由角度, 按 Shift = 正交
            this.measuring.x2 = sp.x;
            this.measuring.y2 = sp.y;
            if (e.shiftKey) {
                const m = this.measuring;
                const dx = Math.abs(m.x2 - m.x1), dy = Math.abs(m.y2 - m.y1);
                if (dx > dy) m.y2 = m.y1; else m.x2 = m.x1;
            }
            this.renderPreview();
        }
    },

    onMouseUp(e) {
        if (this.dragState) {
            if (this.dragState.type !== 'pan') this.pushHistory();
            this.dragState = null;
            this.svg.classList.remove('dragging');
        }
        if (this.drawing) {
            const dr = this.drawing;
            let valid = true;
            if (dr.type === 'wall' || dr.type==='door' || dr.type==='window') {
                const len = Math.hypot(dr.x2-dr.x1, dr.y2-dr.y1);
                if (len < GRID) valid = false;
            } else if (dr.type==='stairs') {
                if (dr.w < GRID*2 || dr.h < GRID*2) valid = false;
            } else if (dr.type==='rect') {
                // 规范化: 允许任意方向拖, 统一为 x,y 左上 + 正宽高
                if (dr.w < 0) { dr.x += dr.w; dr.w = -dr.w; }
                if (dr.h < 0) { dr.y += dr.h; dr.h = -dr.h; }
                if (dr.w < GRID*2 || dr.h < GRID*2) valid = false;
                if (valid) {
                    // 地板自动置底: unshift 而非 push
                    this.objects.unshift(dr);
                    this.select(dr);
                    this.render();
                    this.pushHistory();
                }
                this.drawing = null;
                this.layerOv.innerHTML = '';
                this.tip.style.display='none';
                this.render();
                return;
            } else if (dr.type==='room-preview') {
                if (Math.abs(dr.w) < GRID*2 || Math.abs(dr.h) < GRID*2) valid = false;
                if (valid) this.emitRoomWalls(dr);
                this.drawing = null;
                this.layerOv.innerHTML = '';
                this.tip.style.display='none';
                this.render();
                return;
            }
            if (valid) this.addObject(dr);
            this.drawing = null;
            this.layerOv.innerHTML = '';
            this.tip.style.display='none';
            this.render();
        }
    },

    // 根据 room-preview 生成多段墙
    emitRoomWalls(dr) {
        let { x, y, w, h, shape } = dr;
        // 规范化为左上角+正宽高
        if (w < 0) { x += w; w = -w; }
        if (h < 0) { y += h; h = -h; }
        const mkWall = (x1,y1,x2,y2) => ({
            id: this.nextId++, type:'wall', x1,y1,x2,y2, thickness:24
        });
        const walls = [];
        if (shape === 'room') {
            walls.push(mkWall(x,     y,     x+w, y    ));
            walls.push(mkWall(x+w,   y,     x+w, y+h  ));
            walls.push(mkWall(x+w,   y+h,   x,   y+h  ));
            walls.push(mkWall(x,     y+h,   x,   y    ));
        } else if (shape === 'room-l') {
            // L 型: 去掉右下角
            const cx = x + w*0.6, cy = y + h*0.55;
            walls.push(mkWall(x,   y,   x+w, y));
            walls.push(mkWall(x+w, y,   x+w, cy));
            walls.push(mkWall(x+w, cy,  cx,  cy));
            walls.push(mkWall(cx,  cy,  cx,  y+h));
            walls.push(mkWall(cx,  y+h, x,   y+h));
            walls.push(mkWall(x,   y+h, x,   y));
        } else if (shape === 'room-t') {
            // T 型: 中间凸出
            const x1 = x + w*0.25, x2 = x + w*0.75;
            const midY = y + h*0.5;
            walls.push(mkWall(x,   y,    x1,  y));
            walls.push(mkWall(x1,  y,    x1,  midY));
            walls.push(mkWall(x1,  midY, x2,  midY));
            walls.push(mkWall(x2,  midY, x2,  y));
            walls.push(mkWall(x2,  y,    x+w, y));
            walls.push(mkWall(x+w, y,    x+w, y+h));
            walls.push(mkWall(x+w, y+h,  x,   y+h));
            walls.push(mkWall(x,   y+h,  x,   y));
        }
        walls.forEach(w => this.objects.push(w));
        this.select(null);
        this.pushHistory();
        this.setTool('select');
    },

    onWheel(e) {
        e.preventDefault();
        const factor = e.deltaY < 0 ? 1.15 : 0.87;
        const rect = this.svg.getBoundingClientRect();
        this.zoomAt(factor, e.clientX-rect.left, e.clientY-rect.top);
    },

    onDblClick(e) {
        const p = this.clientToWorld(e.clientX, e.clientY);
        const t = this.hitTest(p);
        if (t && t.type === 'text') {
            const nv = prompt('编辑文字:', t.text);
            if (nv !== null) { t.text = nv; this.render(); this.pushHistory(); }
        }
    },

    onKey(e) {
        const tag = e.target && e.target.tagName;
        if (tag === 'INPUT' || tag === 'TEXTAREA') return;
        if (e.code === 'Space') { this.spaceDown = true; e.preventDefault(); return;}
        if (e.key === 'Delete' || e.key === 'Backspace') { this.deleteSelected(); e.preventDefault(); }
        else if (e.key === 'r' || e.key === 'R') { this.rotateSelected(); }
        else if (e.key === 'Escape') {
            this.drawing = null;
            this.measuring = null;  // 取消当前正在画的预览
            this.select(null);
            this.setTool('select');
            this.render();
        }
        else if (e.ctrlKey && e.key === 'z') { this.undo(); e.preventDefault(); }
        else if (e.ctrlKey && (e.key === 'y' || (e.shiftKey && e.key==='Z'))) { this.redo(); e.preventDefault(); }
        else if (e.ctrlKey && (e.key === 'd' || e.key === 'c' || e.key === 'C')) { this.duplicate(); e.preventDefault(); }
        else if (e.ctrlKey && e.key === 's') { this.saveJSON(); e.preventDefault(); }
        // 方向键移动选中对象
        else if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) {
            if (!this.selected) return;
            const step = e.shiftKey ? GRID * 10 : GRID;  // Shift = 10x
            let dx = 0, dy = 0;
            if (e.key === 'ArrowUp')    dy = -step;
            if (e.key === 'ArrowDown')  dy =  step;
            if (e.key === 'ArrowLeft')  dx = -step;
            if (e.key === 'ArrowRight') dx =  step;
            this.nudgeSelected(dx, dy);
            e.preventDefault();
        }
    },

    // 平移选中对象 (键盘微调)；连续按键合并为一次历史记录
    nudgeSelected(dx, dy) {
        const o = this.selected;
        if (!o) return;
        if ('x' in o && 'y' in o) { o.x += dx; o.y += dy; }
        if ('x1' in o) { o.x1 += dx; o.y1 += dy; o.x2 += dx; o.y2 += dy; }
        this.render();
        this.updatePropsPanel();
        // 防抖: 350ms 内连续 nudge 只记一次历史
        clearTimeout(this._nudgeTimer);
        this._nudgeTimer = setTimeout(() => this.pushHistory(), 350);
    },

    /* ========== 对象管理 ========== */
    addObject(o) {
        this.objects.push(o);
        this.render();
        this.select(o);
        this.pushHistory();
    },
    addFurniture(f, x, y) {
        const w = f.w / MM_PER_UNIT;
        const h = f.h / MM_PER_UNIT;
        const obj = {
            type:'furniture',
            fid: f.id,
            name: f.name,
            x: this.snap(x - w/2),
            y: this.snap(y - h/2),
            w, h, rot:0,
            color:'#f5ebd6',
            id: this.nextId++
        };
        this.addObject(obj);
        this.setTool('select');
    },
    deleteSelected() {
        if (!this.selected) return;
        this.objects = this.objects.filter(o=>o!==this.selected);
        this.select(null);
        this.render();
        this.pushHistory();
    },
    duplicate() {
        if (!this.selected) return;
        const nc = JSON.parse(JSON.stringify(this.selected));
        nc.id = this.nextId++;
        if ('x' in nc) nc.x += GRID*2;
        if ('y' in nc) nc.y += GRID*2;
        if ('x1' in nc) { nc.x1 += GRID*2; nc.y1 += GRID*2; nc.x2 += GRID*2; nc.y2 += GRID*2; }
        this.objects.push(nc);
        this.select(nc);
        this.render();
        this.pushHistory();
    },
    rotateSelected() {
        const o = this.selected;
        if (!o) return;
        if ('rot' in o) { o.rot = (o.rot + 90) % 360; }
        else if (o.type === 'wall' || o.type==='door' || o.type==='window') {
            // 以中点为轴旋转
            const cx = (o.x1+o.x2)/2, cy=(o.y1+o.y2)/2;
            const nx1 = cx - (o.y1-cy), ny1 = cy + (o.x1-cx);
            const nx2 = cx - (o.y2-cy), ny2 = cy + (o.x2-cx);
            o.x1=this.snap(nx1); o.y1=this.snap(ny1); o.x2=this.snap(nx2); o.y2=this.snap(ny2);
        }
        this.render();
        this.pushHistory();
    },
    select(o) {
        this.selected = o;
        this.render();
        this.updatePropsPanel();
    },

    /* ========== 命中测试 ========== */
    hitTest(p) {
        // 从后往前（上层优先）, 跳过隐藏对象
        for (let i = this.objects.length - 1; i >= 0; i--) {
            const o = this.objects[i];
            if (o.visible === false) continue;
            if (this.ptInObj(p, o)) return o;
        }
        return null;
    },
    ptInObj(p, o) {
        if (o.type === 'image' || o.type === 'svg') {
            // 图像对象：考虑旋转的矩形命中
            const cx = o.x + o.w/2, cy = o.y + o.h/2;
            const rad = -(o.rot || 0) * Math.PI / 180;
            const lx = Math.cos(rad)*(p.x-cx) - Math.sin(rad)*(p.y-cy) + cx;
            const ly = Math.sin(rad)*(p.x-cx) + Math.cos(rad)*(p.y-cy) + cy;
            return lx >= o.x && lx <= o.x+o.w && ly >= o.y && ly <= o.y+o.h;
        }
        if (o.type === 'wall' || o.type==='door' || o.type==='window' || o.type==='measure') {
            return distToSeg(p, {x:o.x1,y:o.y1}, {x:o.x2,y:o.y2}) < 8;
        }
        if (o.type === 'furniture' || o.type==='stairs' || o.type==='rect') {
            // 考虑旋转: 把点反向旋转到对象本地
            const cx = o.x + o.w/2, cy = o.y + o.h/2;
            const rad = -(o.rot||0) * Math.PI/180;
            const lx = Math.cos(rad)*(p.x-cx) - Math.sin(rad)*(p.y-cy) + cx;
            const ly = Math.sin(rad)*(p.x-cx) + Math.cos(rad)*(p.y-cy) + cy;
            return lx>=o.x && lx<=o.x+o.w && ly>=o.y && ly<=o.y+o.h;
        }
        if (o.type === 'text') {
            const w = (o.text||'').length * o.size * 0.6;
            return p.x >= o.x-4 && p.x <= o.x+w+4 && p.y >= o.y-o.size && p.y <= o.y+4;
        }
        return false;
    },
    hitHandle(p, o) {
        if (!['furniture','stairs','image','svg','rect'].includes(o.type)) return null;
        const hs = 6 / this.viewport.zoom;
        const pts = {
            'nw':{x:o.x, y:o.y}, 'ne':{x:o.x+o.w, y:o.y},
            'sw':{x:o.x, y:o.y+o.h}, 'se':{x:o.x+o.w, y:o.y+o.h},
        };
        // 旋转后手柄位置
        const cx = o.x+o.w/2, cy=o.y+o.h/2;
        const rad = (o.rot||0)*Math.PI/180;
        for (const k in pts) {
            const pt = pts[k];
            const rx = Math.cos(rad)*(pt.x-cx) - Math.sin(rad)*(pt.y-cy) + cx;
            const ry = Math.sin(rad)*(pt.x-cx) + Math.cos(rad)*(pt.y-cy) + cy;
            if (Math.abs(p.x-rx) < hs && Math.abs(p.y-ry) < hs) return k;
        }
        return null;
    },
    pickEndpoint(p, o) {
        const d1 = Math.hypot(p.x-o.x1, p.y-o.y1);
        const d2 = Math.hypot(p.x-o.x2, p.y-o.y2);
        if (Math.min(d1,d2) < 10) return d1 < d2 ? 1 : 2;
        return 0; // 0=整体
    },
    bboxOf(o) {
        if (o.type === 'image' || o.type === 'svg') {
            return {x:o.x, y:o.y, w:o.w, h:o.h};
        }
        if (o.type==='wall'||o.type==='door'||o.type==='window'||o.type==='measure') {
            const xs=[o.x1,o.x2], ys=[o.y1,o.y2];
            return {x:Math.min(...xs), y:Math.min(...ys), w:Math.abs(o.x2-o.x1)||10, h:Math.abs(o.y2-o.y1)||10};
        }
        if (o.type==='furniture'||o.type==='stairs'||o.type==='rect') return {x:o.x, y:o.y, w:o.w, h:o.h};
        if (o.type==='room-preview') {
            let {x,y,w,h}=o; if (w<0){x+=w;w=-w;} if (h<0){y+=h;h=-h;}
            return {x,y,w:w||10,h:h||10};
        }
        if (o.type==='text') return {x:o.x, y:o.y-o.size, w:(o.text||'').length*o.size*0.6, h:o.size};
        return null;
    },

    /* ========== 渲染 ========== */
    render() {
        this.layerObj.innerHTML = '';
        this.objects.forEach(o => {
            const g = this.renderObj(o);
            if (g) this.layerObj.appendChild(g);
        });
        this.layerOv.innerHTML = '';
        if (this.showDims) this.renderDimensions(this.layerOv);
        if (this.selected) this.drawSelection(this.selected);
        // 正在画的预览测量线
        if (this.measuring) {
            const g = this.renderObj(this.measuring, true);
            if (g) this.layerOv.appendChild(g);
        }
        // 更新状态栏测量指标
        this._updateMeasureStatus();
        document.getElementById('stCount').textContent = this.objects.length;
        this.updateMinimap();
    },

    _updateMeasureStatus() {
        const stEl = document.getElementById('stMeasure');
        const stText = document.getElementById('stMeasureText');
        if (!stEl || !stText) return;
        const ms = this.objects.filter(o => o.type === 'measure');
        // 显示条件: 有已保存的测量 或 正在测量
        const cur = this.measuring || (this.selected && this.selected.type === 'measure' ? this.selected : null) || ms[ms.length-1];
        if (!cur) { stEl.style.display = 'none'; return; }
        stEl.style.display = '';
        const len = Math.hypot(cur.x2-cur.x1, cur.y2-cur.y1) * MM_PER_UNIT;
        const dx = Math.abs(cur.x2-cur.x1) * MM_PER_UNIT;
        const dy = Math.abs(cur.y2-cur.y1) * MM_PER_UNIT;
        const suffix = ms.length > 0 ? ` · 共${ms.length}条` : '';
        stText.textContent = `${len.toFixed(0)}mm (Δ ${dx.toFixed(0)}×${dy.toFixed(0)})${suffix}`;
    },

    /* ========== 自动尺寸标注 ========== */
    toggleDimensions() {
        this.showDims = !this.showDims;
        document.getElementById('btnDim').style.background = this.showDims ? '#5a9fd4' : '';
        this.render();
    },
    renderDimensions(layer) {
        const walls = this.objects.filter(o => o.type === 'wall');
        if (walls.length === 0) return;
        // 包围盒 (只考虑墙)
        let minX=Infinity, minY=Infinity, maxX=-Infinity, maxY=-Infinity;
        walls.forEach(w => {
            minX = Math.min(minX, w.x1, w.x2);
            maxX = Math.max(maxX, w.x1, w.x2);
            minY = Math.min(minY, w.y1, w.y2);
            maxY = Math.max(maxY, w.y1, w.y2);
        });

        // 在四侧找分段节点
        // - 顶边: 取所有 y≈minY 的墙端点的 x 值 + 门窗端点
        // - 类似处理其他三侧
        const TOL = 2;  // 容差 user-unit
        const collectX = (ySide) => {
            const xs = new Set([minX, maxX]);
            this.objects.forEach(o => {
                if (!['wall','door','window'].includes(o.type)) return;
                if (Math.abs(o.y1 - ySide) < TOL) xs.add(o.x1);
                if (Math.abs(o.y2 - ySide) < TOL) xs.add(o.x2);
            });
            return [...xs].filter(x => x>=minX-TOL && x<=maxX+TOL).sort((a,b)=>a-b);
        };
        const collectY = (xSide) => {
            const ys = new Set([minY, maxY]);
            this.objects.forEach(o => {
                if (!['wall','door','window'].includes(o.type)) return;
                if (Math.abs(o.x1 - xSide) < TOL) ys.add(o.y1);
                if (Math.abs(o.x2 - xSide) < TOL) ys.add(o.y2);
            });
            return [...ys].filter(y => y>=minY-TOL && y<=maxY+TOL).sort((a,b)=>a-b);
        };

        const topXs    = collectX(minY);
        const botXs    = collectX(maxY);
        const leftYs   = collectY(minX);
        const rightYs  = collectY(maxX);

        // 绘制尺寸链 (两级: 内侧分段 + 外侧总长)
        const off1 = 35, off2 = 65;   // 距外墙偏移 (user-unit)
        // 顶部
        this.drawDimChain(layer, topXs.map(x=>({x, y:minY})), 'horizontal', minY - off1, false);
        this.drawDimLine(layer, {x:minX, y:minY - off2}, {x:maxX, y:minY - off2}, 'horizontal', true);
        // 底部
        this.drawDimChain(layer, botXs.map(x=>({x, y:maxY})), 'horizontal', maxY + off1, true);
        this.drawDimLine(layer, {x:minX, y:maxY + off2}, {x:maxX, y:maxY + off2}, 'horizontal', true);
        // 左侧
        this.drawDimChain(layer, leftYs.map(y=>({x:minX, y})), 'vertical', minX - off1, false);
        this.drawDimLine(layer, {x:minX - off2, y:minY}, {x:minX - off2, y:maxY}, 'vertical', true);
        // 右侧
        this.drawDimChain(layer, rightYs.map(y=>({x:maxX, y})), 'vertical', maxX + off1, true);
        this.drawDimLine(layer, {x:maxX + off2, y:minY}, {x:maxX + off2, y:maxY}, 'vertical', true);
    },
    // 绘制一条分段尺寸链, pts 按序排列的点, axis = horizontal/vertical
    // linePos = 尺寸线所在的 y (水平链) 或 x (垂直链)
    drawDimChain(layer, pts, axis, linePos, below) {
        if (pts.length < 2) return;
        const ns = 'http://www.w3.org/2000/svg';
        const g = document.createElementNS(ns, 'g');
        g.setAttribute('class', 'dim-chain');
        g.setAttribute('pointer-events','none');

        const EXT = 8;   // 尺寸界线延伸量
        // 引出线 (从每个端点引到尺寸线位置)
        pts.forEach(p => {
            const l = document.createElementNS(ns,'line');
            if (axis === 'horizontal') {
                l.setAttribute('x1',p.x); l.setAttribute('y1', p.y + (below?EXT:-EXT));
                l.setAttribute('x2',p.x); l.setAttribute('y2', linePos + (below?EXT/2:-EXT/2));
            } else {
                l.setAttribute('x1', p.x + (below?EXT:-EXT)); l.setAttribute('y1',p.y);
                l.setAttribute('x2', linePos + (below?EXT/2:-EXT/2)); l.setAttribute('y2',p.y);
            }
            l.setAttribute('stroke','#d06b4a'); l.setAttribute('stroke-width',0.8);
            g.appendChild(l);
        });
        // 分段
        for (let i = 0; i < pts.length - 1; i++) {
            const a = pts[i], b = pts[i+1];
            const l = document.createElementNS(ns,'line');
            if (axis === 'horizontal') {
                l.setAttribute('x1',a.x); l.setAttribute('y1',linePos);
                l.setAttribute('x2',b.x); l.setAttribute('y2',linePos);
            } else {
                l.setAttribute('x1',linePos); l.setAttribute('y1',a.y);
                l.setAttribute('x2',linePos); l.setAttribute('y2',b.y);
            }
            l.setAttribute('stroke','#d06b4a'); l.setAttribute('stroke-width',0.8);
            g.appendChild(l);
            // 端头小斜线 (建筑标注)
            const addTick = (px, py) => {
                const t = document.createElementNS(ns,'line');
                const s = 3;
                if (axis === 'horizontal') {
                    t.setAttribute('x1',px-s); t.setAttribute('y1',linePos-s);
                    t.setAttribute('x2',px+s); t.setAttribute('y2',linePos+s);
                } else {
                    t.setAttribute('x1',linePos-s); t.setAttribute('y1',py-s);
                    t.setAttribute('x2',linePos+s); t.setAttribute('y2',py+s);
                }
                t.setAttribute('stroke','#d06b4a'); t.setAttribute('stroke-width',0.8);
                g.appendChild(t);
            };
            addTick(a.x, a.y);
            addTick(b.x, b.y);
            // 文本
            const mmLen = axis==='horizontal' ? Math.abs(b.x-a.x)*MM_PER_UNIT : Math.abs(b.y-a.y)*MM_PER_UNIT;
            if (mmLen < 50) continue;
            const tx = document.createElementNS(ns,'text');
            if (axis === 'horizontal') {
                tx.setAttribute('x',(a.x+b.x)/2); tx.setAttribute('y',linePos-4);
                tx.setAttribute('text-anchor','middle');
            } else {
                tx.setAttribute('x',linePos-4); tx.setAttribute('y',(a.y+b.y)/2);
                tx.setAttribute('text-anchor','middle');
                tx.setAttribute('transform',`rotate(-90 ${linePos-4} ${(a.y+b.y)/2})`);
            }
            tx.setAttribute('font-size','10'); tx.setAttribute('fill','#d06b4a');
            tx.textContent = Math.round(mmLen);
            g.appendChild(tx);
        }
        layer.appendChild(g);
    },
    // 绘制总长尺寸 (带箭头和粗字)
    drawDimLine(layer, a, b, axis, isTotal) {
        const ns = 'http://www.w3.org/2000/svg';
        const g = document.createElementNS(ns,'g');
        g.setAttribute('pointer-events','none');
        const l = document.createElementNS(ns,'line');
        l.setAttribute('x1',a.x); l.setAttribute('y1',a.y);
        l.setAttribute('x2',b.x); l.setAttribute('y2',b.y);
        l.setAttribute('stroke','#b8472a'); l.setAttribute('stroke-width',1);
        g.appendChild(l);
        // 端头
        const s = 4;
        [[a,1],[b,-1]].forEach(([p,d])=>{
            const t = document.createElementNS(ns,'line');
            if (axis==='horizontal') {
                t.setAttribute('x1',p.x); t.setAttribute('y1',p.y-s);
                t.setAttribute('x2',p.x); t.setAttribute('y2',p.y+s);
            } else {
                t.setAttribute('x1',p.x-s); t.setAttribute('y1',p.y);
                t.setAttribute('x2',p.x+s); t.setAttribute('y2',p.y);
            }
            t.setAttribute('stroke','#b8472a'); t.setAttribute('stroke-width',1);
            g.appendChild(t);
        });
        // 总长文字
        const mm = axis==='horizontal' ? Math.abs(b.x-a.x)*MM_PER_UNIT : Math.abs(b.y-a.y)*MM_PER_UNIT;
        const cx = (a.x+b.x)/2, cy=(a.y+b.y)/2;
        const tx = document.createElementNS(ns,'text');
        if (axis==='horizontal') {
            tx.setAttribute('x',cx); tx.setAttribute('y',cy-5);
            tx.setAttribute('text-anchor','middle');
        } else {
            tx.setAttribute('x',cx-5); tx.setAttribute('y',cy);
            tx.setAttribute('text-anchor','middle');
            tx.setAttribute('transform',`rotate(-90 ${cx-5} ${cy})`);
        }
        tx.setAttribute('font-size','12'); tx.setAttribute('font-weight','bold');
        tx.setAttribute('fill','#b8472a');
        tx.textContent = Math.round(mm);
        g.appendChild(tx);
        layer.appendChild(g);
    },

    renderPreview() {
        this.layerOv.innerHTML = '';
        if (this.showDims) this.renderDimensions(this.layerOv);
        if (this.selected) this.drawSelection(this.selected);
        if (this.drawing) {
            const g = this.renderObj(this.drawing, true);
            if (g) this.layerOv.appendChild(g);
        }
        // 正在测量的预览线 (走统一的 measure 渲染)
        if (this.measuring) {
            const g = this.renderObj(this.measuring, true);
            if (g) this.layerOv.appendChild(g);
        }
    },

    // 删除当前楼层所有测量线对象
    clearMeasures() {
        this.objects = this.objects.filter(o => o.type !== 'measure');
        this.measuring = null;
        if (this.selected && this.selected.type === 'measure') this.select(null);
        this.render();
        this.pushHistory();
    },

    renderObj(o, preview=false) {
        if (o.visible === false) return null;  // 隐藏对象不渲染

        const ns = 'http://www.w3.org/2000/svg';
        const g = document.createElementNS(ns, 'g');
        g.setAttribute('data-id', o.id);
        if (preview) g.setAttribute('opacity','0.6');

        // —— 图像对象 (PNG/JPG 或 SVG)，都用 <image> 节点 ——
        if (o.type === 'image' || o.type === 'svg') {
            const img = document.createElementNS(ns, 'image');
            img.setAttributeNS('http://www.w3.org/1999/xlink', 'href', o.src);
            img.setAttribute('href', o.src);
            img.setAttribute('x', o.x);
            img.setAttribute('y', o.y);
            img.setAttribute('width', o.w);
            img.setAttribute('height', o.h);
            img.setAttribute('opacity', o.opacity != null ? o.opacity : 1);
            img.setAttribute('preserveAspectRatio', 'none');
            // 事件由 JS hitTest 接管，避免拦截其他对象
            img.setAttribute('pointer-events', 'none');
            if (o.rot) {
                g.setAttribute('transform',
                    `rotate(${o.rot} ${o.x + o.w/2} ${o.y + o.h/2})`);
            }
            g.appendChild(img);
            return g;
        }

        if (o.type === 'rect') {
            // 支持绘制预览期的负宽高 (preview=true 时)
            let x = o.x, y = o.y, w = o.w, h = o.h;
            if (w < 0) { x += w; w = -w; }
            if (h < 0) { y += h; h = -h; }
            const r = document.createElementNS(ns,'rect');
            r.setAttribute('x', x); r.setAttribute('y', y);
            r.setAttribute('width', w); r.setAttribute('height', h);
            r.setAttribute('fill', o.color || '#fef3c7');
            r.setAttribute('fill-opacity', o.opacity != null ? o.opacity : 0.6);
            r.setAttribute('stroke', 'none');
            if (o.rot) {
                r.setAttribute('transform', `rotate(${o.rot} ${x+w/2} ${y+h/2})`);
            }
            g.appendChild(r);
            // 中心标签 (名称)
            if (o.name) {
                const t = document.createElementNS(ns,'text');
                t.setAttribute('x', x + w/2);
                t.setAttribute('y', y + h/2 + 4);
                t.setAttribute('text-anchor', 'middle');
                t.setAttribute('font-size', '12');
                t.setAttribute('fill', '#4b5563');
                t.setAttribute('pointer-events', 'none');
                t.textContent = o.name;
                g.appendChild(t);
            }
            return g;
        }

        if (o.type === 'room-preview') {
            let { x, y, w, h } = o;
            if (w < 0) { x += w; w = -w; }
            if (h < 0) { y += h; h = -h; }
            const r = document.createElementNS(ns,'rect');
            r.setAttribute('x',x); r.setAttribute('y',y);
            r.setAttribute('width',w); r.setAttribute('height',h);
            r.setAttribute('fill','rgba(59,130,246,0.1)');
            r.setAttribute('stroke','#3b82f6');
            r.setAttribute('stroke-width',2);
            r.setAttribute('stroke-dasharray','6,4');
            g.appendChild(r);
            return g;
        }
        if (o.type === 'wall') {
            const th = o.thickness || 24;
            // 墙用加粗线
            const line = document.createElementNS(ns,'line');
            line.setAttribute('x1',o.x1); line.setAttribute('y1',o.y1);
            line.setAttribute('x2',o.x2); line.setAttribute('y2',o.y2);
            line.setAttribute('stroke','#2c2c2c'); line.setAttribute('stroke-width',th);
            line.setAttribute('stroke-linecap','butt');
            g.appendChild(line);
        }
        else if (o.type === 'window') {
            const th = o.thickness || 10;  // 默认 10 user-unit = 100mm
            const line = document.createElementNS(ns,'line');
            line.setAttribute('x1',o.x1); line.setAttribute('y1',o.y1);
            line.setAttribute('x2',o.x2); line.setAttribute('y2',o.y2);
            line.setAttribute('stroke','#1a7fc9'); line.setAttribute('stroke-width', th);
            g.appendChild(line);
            const inner = document.createElementNS(ns,'line');
            inner.setAttribute('x1',o.x1); inner.setAttribute('y1',o.y1);
            inner.setAttribute('x2',o.x2); inner.setAttribute('y2',o.y2);
            inner.setAttribute('stroke','#fff'); inner.setAttribute('stroke-width', th * 0.4);
            g.appendChild(inner);
        }
        else if (o.type === 'door') {
            const len = Math.hypot(o.x2-o.x1, o.y2-o.y1);
            const ang = Math.atan2(o.y2-o.y1, o.x2-o.x1);
            // 门洞（白底覆盖墙）
            const rect = document.createElementNS(ns,'line');
            rect.setAttribute('x1',o.x1); rect.setAttribute('y1',o.y1);
            rect.setAttribute('x2',o.x2); rect.setAttribute('y2',o.y2);
            rect.setAttribute('stroke','#fff'); rect.setAttribute('stroke-width',24);
            g.appendChild(rect);
            // 门扇 (实线)
            const d = document.createElementNS(ns,'line');
            d.setAttribute('x1',o.x1); d.setAttribute('y1',o.y1);
            const ex = o.x1 + Math.cos(ang - Math.PI/2)*len;
            const ey = o.y1 + Math.sin(ang - Math.PI/2)*len;
            d.setAttribute('x2',ex); d.setAttribute('y2',ey);
            d.setAttribute('stroke','#c97f1a'); d.setAttribute('stroke-width',2);
            g.appendChild(d);
            // 开启弧线
            const arc = document.createElementNS(ns,'path');
            arc.setAttribute('d', `M ${o.x1+Math.cos(ang)*len} ${o.y1+Math.sin(ang)*len} A ${len} ${len} 0 0 0 ${ex} ${ey}`);
            arc.setAttribute('fill','none');
            arc.setAttribute('stroke','#c97f1a'); arc.setAttribute('stroke-width',1); arc.setAttribute('stroke-dasharray','4,3');
            g.appendChild(arc);
        }
        else if (o.type === 'furniture') {
            const def = this.FURNITURE.find(f=>f.id===o.fid);
            const trans = `translate(${o.x+o.w/2},${o.y+o.h/2}) rotate(${o.rot||0}) translate(${-o.w/2},${-o.h/2})`;
            g.setAttribute('transform', trans);
            if (def && def.draw) def.draw(g, o);
            else drawBox(g, o);
            // 中心标签
            const lbl = document.createElementNS(ns,'text');
            lbl.setAttribute('x', o.w/2); lbl.setAttribute('y', o.h/2+4);
            lbl.setAttribute('text-anchor','middle');
            lbl.setAttribute('font-size','10'); lbl.setAttribute('fill','#555');
            lbl.textContent = o.name || '';
            g.appendChild(lbl);
        }
        else if (o.type === 'stairs') {
            const trans = `translate(${o.x+o.w/2},${o.y+o.h/2}) rotate(${o.rot||0}) translate(${-o.w/2},${-o.h/2})`;
            g.setAttribute('transform', trans);
            const rect = document.createElementNS(ns,'rect');
            rect.setAttribute('x',0); rect.setAttribute('y',0);
            rect.setAttribute('width',o.w); rect.setAttribute('height',o.h);
            rect.setAttribute('fill','#fafafa'); rect.setAttribute('stroke','#666');
            g.appendChild(rect);
            const steps = o.steps || 10;
            const sh = o.h / steps;
            for (let i=1; i<steps; i++) {
                const ln = document.createElementNS(ns,'line');
                ln.setAttribute('x1',0); ln.setAttribute('y1', i*sh);
                ln.setAttribute('x2',o.w); ln.setAttribute('y2', i*sh);
                ln.setAttribute('stroke','#888'); ln.setAttribute('stroke-width',0.5);
                g.appendChild(ln);
            }
            // 箭头
            const arr = document.createElementNS(ns,'text');
            arr.setAttribute('x', o.w/2); arr.setAttribute('y', o.h/2+5);
            arr.setAttribute('text-anchor','middle'); arr.setAttribute('font-size','12'); arr.setAttribute('fill','#333');
            arr.textContent = o.dir==='down' ? '↓ DN' : '↑ UP';
            g.appendChild(arr);
        }
        else if (o.type === 'text') {
            const t = document.createElementNS(ns,'text');
            t.setAttribute('x', o.x); t.setAttribute('y', o.y);
            t.setAttribute('font-size', o.size||16);
            t.setAttribute('fill', o.color || '#2c3e50');
            t.setAttribute('font-weight','bold');
            if (o.rot) t.setAttribute('transform', `rotate(${o.rot} ${o.x} ${o.y})`);
            t.textContent = o.text || '';
            g.appendChild(t);
        }
        else if (o.type === 'measure') {
            // 红色虚线皮尺 + 两端十字 + 中点标签 (沿线方向旋转)
            const z = this.viewport.zoom || 1;
            const LW = 1.5 / z, TICK = 6 / z, FS = 12 / z;
            const dxU = o.x2 - o.x1, dyU = o.y2 - o.y1;
            const lenMm = Math.hypot(dxU, dyU) * MM_PER_UNIT;

            // 主线
            const ln = document.createElementNS(ns,'line');
            ln.setAttribute('x1', o.x1); ln.setAttribute('y1', o.y1);
            ln.setAttribute('x2', o.x2); ln.setAttribute('y2', o.y2);
            ln.setAttribute('stroke', '#dc2626');
            ln.setAttribute('stroke-width', LW);
            ln.setAttribute('stroke-dasharray', `${6/z},${3/z}`);
            g.appendChild(ln);
            // 两端十字
            [[o.x1,o.y1],[o.x2,o.y2]].forEach(([px,py]) => {
                const h = document.createElementNS(ns,'line');
                h.setAttribute('x1', px-TICK); h.setAttribute('y1', py);
                h.setAttribute('x2', px+TICK); h.setAttribute('y2', py);
                h.setAttribute('stroke', '#dc2626'); h.setAttribute('stroke-width', LW);
                g.appendChild(h);
                const v = document.createElementNS(ns,'line');
                v.setAttribute('x1', px); v.setAttribute('y1', py-TICK);
                v.setAttribute('x2', px); v.setAttribute('y2', py+TICK);
                v.setAttribute('stroke', '#dc2626'); v.setAttribute('stroke-width', LW);
                g.appendChild(v);
            });
            // 标签
            if (lenMm >= 1) {
                const midX = (o.x1+o.x2)/2, midY = (o.y1+o.y2)/2;
                const angleDeg = Math.atan2(dyU, dxU) * 180 / Math.PI;
                const dxMm = Math.abs(dxU) * MM_PER_UNIT;
                const dyMm = Math.abs(dyU) * MM_PER_UNIT;
                const label = `${lenMm.toFixed(0)} mm  (Δ ${dxMm.toFixed(0)}×${dyMm.toFixed(0)}, ${angleDeg.toFixed(1)}°)`;
                let textAngle = angleDeg;
                if (textAngle > 90 || textAngle < -90) textAngle += 180;
                const len = Math.hypot(dxU, dyU) || 1;
                const nx = -dyU / len, ny = dxU / len;
                const offDist = 6 / z;
                const tx = midX + nx*offDist, ty = midY + ny*offDist;
                const estW = label.length * FS * 0.55;
                const estH = FS * 1.3;
                const pad = 4 / z;
                const bg = document.createElementNS(ns,'rect');
                bg.setAttribute('x', tx-estW/2-pad);
                bg.setAttribute('y', ty-estH/2-pad/2);
                bg.setAttribute('width', estW+pad*2);
                bg.setAttribute('height', estH+pad);
                bg.setAttribute('fill', '#ffffff');
                bg.setAttribute('stroke', '#dc2626');
                bg.setAttribute('stroke-width', LW*0.7);
                bg.setAttribute('rx', 3/z);
                bg.setAttribute('transform', `rotate(${textAngle} ${tx} ${ty})`);
                g.appendChild(bg);
                const tEl = document.createElementNS(ns,'text');
                tEl.setAttribute('x', tx);
                tEl.setAttribute('y', ty + FS/3);
                tEl.setAttribute('text-anchor', 'middle');
                tEl.setAttribute('font-size', FS);
                tEl.setAttribute('font-weight', 'bold');
                tEl.setAttribute('fill', '#dc2626');
                tEl.setAttribute('transform', `rotate(${textAngle} ${tx} ${ty})`);
                tEl.textContent = label;
                g.appendChild(tEl);
            }
        }
        return g;
    },

    drawSelection(o) {
        const ns = 'http://www.w3.org/2000/svg';
        const b = this.bboxOf(o); if (!b) return;

        if (['furniture','stairs','image','svg','rect'].includes(o.type)) {
            const cx = o.x+o.w/2, cy=o.y+o.h/2;
            const g = document.createElementNS(ns,'g');
            g.setAttribute('transform', `translate(${cx},${cy}) rotate(${o.rot||0}) translate(${-cx},${-cy})`);
            const r = document.createElementNS(ns,'rect');
            r.setAttribute('x',o.x); r.setAttribute('y',o.y);
            r.setAttribute('width',o.w); r.setAttribute('height',o.h);
            r.setAttribute('fill','none'); r.setAttribute('stroke','#3b82f6'); r.setAttribute('stroke-width',1.5);
            r.setAttribute('stroke-dasharray','4,2');
            g.appendChild(r);
            [[o.x,o.y],[o.x+o.w,o.y],[o.x,o.y+o.h],[o.x+o.w,o.y+o.h]].forEach(([hx,hy])=>{
                const h = document.createElementNS(ns,'rect');
                const s = 6/this.viewport.zoom;
                h.setAttribute('x',hx-s/2); h.setAttribute('y',hy-s/2);
                h.setAttribute('width',s); h.setAttribute('height',s);
                h.setAttribute('fill','#3b82f6'); h.setAttribute('stroke','#fff');
                g.appendChild(h);
            });
            this.layerOv.appendChild(g);
        } else {
            const r = document.createElementNS(ns,'rect');
            r.setAttribute('x',b.x-4); r.setAttribute('y',b.y-4);
            r.setAttribute('width',b.w+8); r.setAttribute('height',b.h+8);
            r.setAttribute('fill','none'); r.setAttribute('stroke','#3b82f6'); r.setAttribute('stroke-width',1.5);
            r.setAttribute('stroke-dasharray','4,2');
            this.layerOv.appendChild(r);
        }

        // 到最近墙的相对间距 (仅对家具/楼梯显示)
        if (o.type==='furniture' || o.type==='stairs') {
            this.drawRelativeDims(o, b);
        }
    },

    // 绘制选中对象到最近墙的距离
    drawRelativeDims(o, b) {
        const ns = 'http://www.w3.org/2000/svg';
        const walls = this.objects.filter(w => w.type === 'wall');
        if (walls.length === 0) return;
        const cx = b.x + b.w/2, cy = b.y + b.h/2;

        const draw = (x1, y1, x2, y2, mm, orient) => {
            const g = document.createElementNS(ns,'g');
            g.setAttribute('pointer-events','none');
            const l = document.createElementNS(ns,'line');
            l.setAttribute('x1',x1); l.setAttribute('y1',y1);
            l.setAttribute('x2',x2); l.setAttribute('y2',y2);
            l.setAttribute('stroke','#3b82f6'); l.setAttribute('stroke-width',0.6);
            l.setAttribute('stroke-dasharray','3,2');
            g.appendChild(l);
            // 端点小线
            const tick = (px,py,dx,dy) => {
                const t = document.createElementNS(ns,'line');
                t.setAttribute('x1',px-dx); t.setAttribute('y1',py-dy);
                t.setAttribute('x2',px+dx); t.setAttribute('y2',py+dy);
                t.setAttribute('stroke','#3b82f6'); t.setAttribute('stroke-width',0.8);
                g.appendChild(t);
            };
            const td = 3;
            if (orient==='h') { tick(x1,y1,0,td); tick(x2,y2,0,td);}
            else { tick(x1,y1,td,0); tick(x2,y2,td,0);}
            // 文本
            const tx = document.createElementNS(ns,'text');
            const mx = (x1+x2)/2, my = (y1+y2)/2;
            if (orient === 'h') {
                tx.setAttribute('x',mx); tx.setAttribute('y',my-3);
                tx.setAttribute('text-anchor','middle');
            } else {
                tx.setAttribute('x',mx-3); tx.setAttribute('y',my);
                tx.setAttribute('text-anchor','middle');
                tx.setAttribute('transform',`rotate(-90 ${mx-3} ${my})`);
            }
            tx.setAttribute('font-size','10'); tx.setAttribute('fill','#3b82f6');
            tx.setAttribute('font-weight','bold');
            tx.textContent = mm;
            g.appendChild(tx);
            this.layerOv.appendChild(g);
        };

        // 找左侧最近墙 (垂直墙, x < b.x)
        let minL = Infinity;
        walls.forEach(w => {
            if (Math.abs(w.x1-w.x2) < 2) {
                const wx = w.x1;
                if (wx < b.x - 0.1) {
                    const yMin = Math.min(w.y1,w.y2), yMax = Math.max(w.y1,w.y2);
                    if (cy >= yMin && cy <= yMax) {
                        const d = b.x - wx;
                        if (d < minL) minL = d;
                    }
                }
            }
        });
        if (minL < Infinity) draw(b.x - minL, cy, b.x, cy, Math.round(minL*MM_PER_UNIT), 'h');

        // 右侧
        let minR = Infinity;
        walls.forEach(w => {
            if (Math.abs(w.x1-w.x2) < 2) {
                const wx = w.x1;
                if (wx > b.x+b.w + 0.1) {
                    const yMin = Math.min(w.y1,w.y2), yMax = Math.max(w.y1,w.y2);
                    if (cy >= yMin && cy <= yMax) {
                        const d = wx - (b.x+b.w);
                        if (d < minR) minR = d;
                    }
                }
            }
        });
        if (minR < Infinity) draw(b.x+b.w, cy, b.x+b.w+minR, cy, Math.round(minR*MM_PER_UNIT), 'h');

        // 上
        let minT = Infinity;
        walls.forEach(w => {
            if (Math.abs(w.y1-w.y2) < 2) {
                const wy = w.y1;
                if (wy < b.y - 0.1) {
                    const xMin = Math.min(w.x1,w.x2), xMax = Math.max(w.x1,w.x2);
                    if (cx >= xMin && cx <= xMax) {
                        const d = b.y - wy;
                        if (d < minT) minT = d;
                    }
                }
            }
        });
        if (minT < Infinity) draw(cx, b.y - minT, cx, b.y, Math.round(minT*MM_PER_UNIT), 'v');

        // 下
        let minB = Infinity;
        walls.forEach(w => {
            if (Math.abs(w.y1-w.y2) < 2) {
                const wy = w.y1;
                if (wy > b.y+b.h + 0.1) {
                    const xMin = Math.min(w.x1,w.x2), xMax = Math.max(w.x1,w.x2);
                    if (cx >= xMin && cx <= xMax) {
                        const d = wy - (b.y+b.h);
                        if (d < minB) minB = d;
                    }
                }
            }
        });
        if (minB < Infinity) draw(cx, b.y+b.h, cx, b.y+b.h+minB, Math.round(minB*MM_PER_UNIT), 'v');
    },

    showDim(o) {
        if (!o) { this.tip.style.display='none'; return; }
        let text = '';
        if (o.type==='wall'||o.type==='door'||o.type==='window'||o.type==='measure') {
            const len = Math.hypot(o.x2-o.x1, o.y2-o.y1) * MM_PER_UNIT;
            text = `长度: ${Math.round(len)} mm`;
        } else if ('w' in o && 'h' in o) {
            text = `${Math.round(o.w*MM_PER_UNIT)} × ${Math.round(o.h*MM_PER_UNIT)} mm`;
        }
        if (!text) { this.tip.style.display='none'; return; }
        // 定位在对象中心
        const b = this.bboxOf(o);
        const cx = (b.x + b.w/2) * this.viewport.zoom + this.viewport.x;
        const cy = (b.y - 10) * this.viewport.zoom + this.viewport.y;
        this.tip.textContent = text;
        this.tip.style.left = cx+'px'; this.tip.style.top = cy+'px';
        this.tip.style.display = 'block';
    },

    /* ========== 属性面板 ========== */
    updatePropsPanel() {
        const p = document.getElementById('props');
        const o = this.selected;

        if (!o) {
            const imageCount = this.objects.filter(x => x.type === 'image' || x.type === 'svg').length;
            let imageHint = '';
            if (imageCount > 0) {
                imageHint = `<div style="margin-top:16px;padding:10px;background:#fef3c7;border-radius:4px;font-size:12px;color:#92400e;">
                    🖼 当前楼层有 ${imageCount} 个图像组件，点击即可编辑
                  </div>`;
            }
            p.innerHTML = '<h3>属性</h3><div class="empty-hint">未选中对象<br><br>📌 快速上手<br>• 左侧工具：房间/L型/T型 一键画<br>• 图形库：拖拽到画布<br>• 🖼 底图：置底半透明，适合描图<br>• 📎 图片 / 🎨 SVG：作为组件插入<br>• 每个对象可独立显示/隐藏、调整图层<br>• 滚轮缩放 · 中键/Space 平移<br>• 方向键微移 (Shift=10×)<br>• Delete删除 · Ctrl+C/D复制 · R旋转</div>' + imageHint;
            this.tip.style.display='none';
            return;
        }

        const row = (label, input) => `<div class="prop-row"><label>${label}</label>${input}</div>`;
        const ni = (k, step=1) => `<input type="number" step="${step}" value="${Math.round((o[k]||0)*MM_PER_UNIT)}" onchange="app.setProp('${k}', this.value/${MM_PER_UNIT})">`;

        let html = `<h3>${typeLabel(o.type)}${o.name?' · '+escapeXml(o.name):''}</h3>`;

        // —— 通用: 可见 (所有对象都有) ——
        html += row('可见', `<input type="checkbox" ${o.visible !== false ? 'checked' : ''} onchange="app.setProp('visible', this.checked)">`);

        // —— 类型专属字段 ——
        if (o.type === 'image' || o.type === 'svg') {
            html += row('透明度', `<input type="range" min="0.1" max="1" step="0.05" value="${o.opacity != null ? o.opacity : 1}" oninput="app.setProp('opacity',+this.value)">`);
            html += row('X (mm)', ni('x'));
            html += row('Y (mm)', ni('y'));
            html += row('宽 (mm)', ni('w'));
            html += row('高 (mm)', ni('h'));
            html += row('旋转°', `<input type="number" step="1" value="${o.rot || 0}" onchange="app.setProp('rot',+this.value)">`);
            html += row('名称', `<input type="text" value="${escapeXml(o.name||'')}" onchange="app.setProp('name', this.value)">`);
            html += `<div style="margin-top:10px;padding:8px;background:#f9fafb;border-radius:4px;font-size:11px;color:#6b7280;line-height:1.6;">
                💡 拖角缩放等比 · Shift+拖角自由 · R 旋转 90°
              </div>
              <button style="width:100%;margin-top:8px;padding:6px;background:#f59e0b;color:#fff;border:none;border-radius:4px;cursor:pointer;" onclick="app.calibrateBackground()">📐 两点重新标定</button>`;
        }
        else if (o.type==='wall' || o.type==='door' || o.type==='window' || o.type==='measure') {
            html += row('X1 (mm)', ni('x1'));
            html += row('Y1 (mm)', ni('y1'));
            html += row('X2 (mm)', ni('x2'));
            html += row('Y2 (mm)', ni('y2'));
            const len = Math.round(Math.hypot(o.x2-o.x1,o.y2-o.y1)*MM_PER_UNIT);
            html += row('长度', `<input type="number" value="${len}" onchange="app.setLength(this.value)">`);
            if (o.type==='wall') html += row('墙厚 (mm)', `<input type="number" step="10" value="${Math.round((o.thickness||24)*MM_PER_UNIT/10)*10}" onchange="app.setProp('thickness', +this.value/${MM_PER_UNIT})">`);
            if (o.type==='window') html += row('窗厚 (mm)', `<input type="number" step="10" value="${Math.round((o.thickness||10)*MM_PER_UNIT/10)*10}" onchange="app.setProp('thickness', +this.value/${MM_PER_UNIT})">`);
            if (o.type==='measure') {
                const dx = Math.round(Math.abs(o.x2-o.x1)*MM_PER_UNIT);
                const dy = Math.round(Math.abs(o.y2-o.y1)*MM_PER_UNIT);
                const angle = (Math.atan2(o.y2-o.y1, o.x2-o.x1) * 180 / Math.PI).toFixed(1);
                html += `<div style="margin-top:6px;padding:8px;background:#fef2f2;border-left:3px solid #dc2626;border-radius:3px;font-size:11px;color:#7f1d1d;line-height:1.6;">
                    📏 测量结果<br>
                    <b>长度</b>: ${len} mm<br>
                    <b>水平</b>: ${dx} mm<br>
                    <b>垂直</b>: ${dy} mm<br>
                    <b>角度</b>: ${angle}°
                </div>`;
            }
        }
        else if (o.type==='furniture' || o.type==='stairs' || o.type==='rect') {
            html += row('X (mm)', ni('x'));
            html += row('Y (mm)', ni('y'));
            html += row('宽 (mm)', ni('w'));
            html += row('高 (mm)', ni('h'));
            html += row('旋转', `<input type="number" value="${o.rot||0}" step="15" onchange="app.setProp('rot',+this.value)">`);
            if (o.type==='furniture') {
                html += row('名称', `<input type="text" value="${escapeXml(o.name||'')}" onchange="app.setProp('name', this.value)">`);
                html += row('颜色', `<input type="color" value="${o.color||'#f5ebd6'}" onchange="app.setProp('color', this.value)">`);
            }
            if (o.type==='stairs') {
                html += row('踏步数', `<input type="number" value="${o.steps||10}" onchange="app.setProp('steps',+this.value)">`);
                html += row('方向', `<select onchange="app.setProp('dir',this.value)"><option value="up" ${o.dir!=='down'?'selected':''}>向上</option><option value="down" ${o.dir==='down'?'selected':''}>向下</option></select>`);
            }
            if (o.type==='rect') {
                html += row('名称', `<input type="text" value="${escapeXml(o.name||'')}" placeholder="如: 客厅/卧室" onchange="app.setProp('name', this.value)">`);
                html += row('填充色', `<input type="color" value="${o.color||'#fef3c7'}" onchange="app.setProp('color', this.value)">`);
                html += row('透明度', `<input type="range" min="0.1" max="1" step="0.05" value="${o.opacity != null ? o.opacity : 0.6}" oninput="app.setProp('opacity',+this.value)">`);
            }
        }
        else if (o.type==='text') {
            html += row('内容', `<input type="text" value="${escapeXml(o.text||'')}" onchange="app.setProp('text',this.value)">`);
            html += row('X (mm)', ni('x'));
            html += row('Y (mm)', ni('y'));
            html += row('字号', `<input type="number" value="${o.size||16}" onchange="app.setProp('size',+this.value)">`);
            html += row('颜色', `<input type="color" value="${o.color||'#2c3e50'}" onchange="app.setProp('color',this.value)">`);
            html += row('旋转', `<input type="number" value="${o.rot||0}" step="15" onchange="app.setProp('rot',+this.value)">`);
        }

        // —— 图层顺序 ——
        const idx = this.objects.indexOf(o);
        const total = this.objects.length;
        html += `<div style="margin-top:12px;padding-top:10px;border-top:1px solid #e5e7eb;">
          <div style="font-size:11px;color:#9ca3af;margin-bottom:6px;">图层顺序 (${idx+1}/${total}, 越后越上层)</div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:4px;">
            <button onclick="app.sendToBack()" style="padding:5px;background:#fff;border:1px solid #e5e7eb;border-radius:3px;cursor:pointer;font-size:11px;" title="置于底层">⬇⬇ 置底</button>
            <button onclick="app.bringToFront()" style="padding:5px;background:#fff;border:1px solid #e5e7eb;border-radius:3px;cursor:pointer;font-size:11px;" title="置于顶层">⬆⬆ 置顶</button>
            <button onclick="app.lowerOne()" style="padding:5px;background:#fff;border:1px solid #e5e7eb;border-radius:3px;cursor:pointer;font-size:11px;" title="下移一层">⬇ 下移</button>
            <button onclick="app.raiseOne()" style="padding:5px;background:#fff;border:1px solid #e5e7eb;border-radius:3px;cursor:pointer;font-size:11px;" title="上移一层">⬆ 上移</button>
          </div>
        </div>`;

        // —— 操作按钮 ——
        html += `<div style="margin-top:10px;display:flex;gap:6px;">
            <button onclick="app.duplicate()" style="flex:1;background:#383a40;border:none;color:#ddd;padding:6px;border-radius:4px;cursor:pointer;">复制</button>
            <button onclick="app.deleteSelected()" style="flex:1;background:#a54040;border:none;color:#fff;padding:6px;border-radius:4px;cursor:pointer;">删除</button>
        </div>`;
        p.innerHTML = html;
    },
    setProp(k, v) {
        if (!this.selected) return;
        this.selected[k] = v;
        this.render();
        this.pushHistory();
    },
    setLength(mmStr) {
        const mm = +mmStr; if (!mm || !this.selected) return;
        const o = this.selected;
        const len = Math.hypot(o.x2-o.x1, o.y2-o.y1);
        const newLen = mm / MM_PER_UNIT;
        const ux = (o.x2-o.x1)/len, uy = (o.y2-o.y1)/len;
        o.x2 = o.x1 + ux*newLen; o.y2 = o.y1 + uy*newLen;
        this.render(); this.pushHistory();
    },

    /* ========== 历史 ========== */
    pushHistory() {
        const snap = JSON.stringify({ floors:this.floors, cur:this.currentFloor, id:this.nextId });
        this.history = this.history.slice(0, this.historyIdx+1);
        this.history.push(snap);
        if (this.history.length > 50) this.history.shift();
        this.historyIdx = this.history.length - 1;
    },
    undo() {
        if (this.historyIdx <= 0) return;
        this.historyIdx--;
        this.restoreFromSnap(this.history[this.historyIdx]);
    },
    redo() {
        if (this.historyIdx >= this.history.length-1) return;
        this.historyIdx++;
        this.restoreFromSnap(this.history[this.historyIdx]);
    },
    restoreFromSnap(s) {
        const d = JSON.parse(s);
        this.floors = d.floors;
        this.currentFloor = Math.min(d.cur || 0, this.floors.length-1);
        this.nextId = d.id;
        this.select(null);
        this.renderFloorTabs();
        this.render();
    },

    /* ========== 保存/加载 ========== */
    newProject() {
        if (!confirm('清空整个项目(所有楼层)?')) return;
        this.floors = [{ name:'1F', objects:[] }];
        this.currentFloor = 0;
        this.nextId = 1;
        this.select(null);
        this.renderFloorTabs();
        this.render();
        this.pushHistory();
    },
    saveJSON() {
        const data = { version:2, floors:this.floors, currentFloor:this.currentFloor, nextId:this.nextId };
        const blob = new Blob([JSON.stringify(data,null,2)], {type:'application/json'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'floorplan_'+Date.now()+'.json';
        a.click();
    },
    openLoadDlg() {
        document.getElementById('loadDlg').classList.add('show');
    },
    loadFromText() {
        const t = document.getElementById('loadText').value.trim();
        if (!t) return;
        try {
            const d = JSON.parse(t);
            this.importData(d);
            this.pushHistory();
            document.getElementById('loadDlg').classList.remove('show');
        } catch(e) { alert('JSON格式错误: '+e.message); }
    },
    importData(d) {
        // 兼容 v2 (多楼层) / v1 (单楼层)
        if (d.floors && Array.isArray(d.floors)) {
            this.floors = d.floors;
            this.currentFloor = Math.min(d.currentFloor||0, this.floors.length-1);
        } else {
            this.floors = [{ name:'1F', objects: d.objects || [] }];
            this.currentFloor = 0;
        }
        // 重算 nextId (先算一次, 迁移时可能继续用)
        let maxId = 0;
        this.floors.forEach(f => (f.objects||[]).forEach(o => { if (o.id > maxId) maxId = o.id; }));
        this.nextId = Math.max(d.nextId || 0, maxId + 1);

        // —— 兼容迁移: floors[i].bgImage → objects 数组开头 (type='image', 置底) ——
        this.floors.forEach(f => {
            if (!Array.isArray(f.objects)) f.objects = [];
            if (f.bgImage) {
                const bg = f.bgImage;
                const imgObj = {
                    id: this.nextId++,
                    type: 'image',
                    src: bg.src,
                    x: bg.x, y: bg.y, w: bg.w, h: bg.h,
                    rot: bg.rot || 0,
                    opacity: bg.opacity != null ? bg.opacity : 0.5,
                    visible: bg.visible !== false,
                    name: '底图'
                };
                f.objects.unshift(imgObj);
                delete f.bgImage;
            }
        });

        this.select(null);
        this.renderFloorTabs();
        this.render();
    },

    /* ========== 导出 SVG ========== */
    exportSVG() {
        const allFloors = this.floors.length > 1
            ? confirm(`导出所有 ${this.floors.length} 个楼层并排显示?\n(取消=仅导出当前楼层)`)
            : false;
        const floorsToExport = allFloors ? this.floors.map((f,i)=>i) : [this.currentFloor];

        const pad = 60;
        const gap = 200;                // 楼层间水平间距
        const titleH = 60;              // 楼层标题上方预留
        // 先计算每层包围盒
        const bounds = floorsToExport.map(i => this.getBoundsOf(this.floors[i].objects));
        // 左右并排布局
        let cursorX = 0;
        const placed = bounds.map(b => {
            const offX = cursorX - b.x;
            cursorX += b.w + gap;
            return { offX, b };
        });
        const totalW = cursorX - gap;
        const maxH = Math.max(...bounds.map(b=>b.h));
        const vb = { x: -pad, y: -pad - titleH, w: totalW + pad*2, h: maxH + pad*2 + titleH };

        let svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="${vb.x} ${vb.y} ${vb.w} ${vb.h}" width="${vb.w}" height="${vb.h}">\n`;
        svg += `<rect x="${vb.x}" y="${vb.y}" width="${vb.w}" height="${vb.h}" fill="white"/>\n`;

        const prevSel = this.selected;
        this.selected = null;
        const prevDims = this.showDims;

        floorsToExport.forEach((fi, idx) => {
            const f = this.floors[fi];
            const p = placed[idx];
            const offY = -p.b.y;
            svg += `<g transform="translate(${p.offX},${offY})">\n`;
            // 楼层标题
            svg += `<text x="${p.b.x + p.b.w/2}" y="${p.b.y - 25}" text-anchor="middle" font-size="22" font-weight="bold" fill="#222">${escapeXml(f.name)}</text>\n`;
            // 对象 (image/svg 类型已在对象数组中, 由 renderObj 统一处理)
            const tmp = document.createElementNS('http://www.w3.org/2000/svg','g');
            // 暂切换 objects 引用给 renderObj 用
            const prevFloor = this.currentFloor;
            this.currentFloor = fi;
            f.objects.forEach(o => {
                const g = this.renderObj(o);
                if (g) tmp.appendChild(g);
            });
            // 尺寸标注(保持与画布一致的开关)
            if (prevDims) this.renderDimensions(tmp);
            this.currentFloor = prevFloor;
            svg += tmp.innerHTML;
            svg += `\n</g>\n`;
        });
        this.selected = prevSel;

        svg += '</svg>';
        const blob = new Blob([svg], {type:'image/svg+xml'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'floorplan_'+Date.now()+'.svg';
        a.click();
    },
    getBounds() { return this.getBoundsOf(this.objects); },
    getBoundsOf(objs) {
        if (!objs || objs.length === 0) return {x:0,y:0,w:1000,h:1000};
        let mx=Infinity,my=Infinity,Mx=-Infinity,My=-Infinity;
        objs.forEach(o => {
            const b = this.bboxOf(o); if (!b) return;
            mx=Math.min(mx,b.x); my=Math.min(my,b.y);
            Mx=Math.max(Mx,b.x+b.w); My=Math.max(My,b.y+b.h);
        });
        if (mx===Infinity) return {x:0,y:0,w:1000,h:1000};
        return {x:mx, y:my, w:Mx-mx, h:My-my};
    },

    /* ========== 导出 DXF (简化) ========== */
    exportDXF() {
        const allFloors = this.floors.length > 1
            ? confirm(`导出所有 ${this.floors.length} 个楼层?\n(取消=仅当前楼层)`)
            : false;
        const floorsToExport = allFloors ? this.floors.map((f,i)=>i) : [this.currentFloor];

        // DXF 用 mm 为单位, Y 轴翻转
        const L = [];
        L.push('0','SECTION','2','HEADER','0','ENDSEC');
        L.push('0','SECTION','2','TABLES');
        L.push('0','TABLE','2','LAYER','70','16');
        const layers = [
            ['WALL','7'], ['DOOR','2'], ['WINDOW','5'], ['FURNITURE','3'],
            ['STAIRS','8'], ['TEXT','1'], ['DIM','4'], ['FLOOR_TITLE','6']
        ];
        // 每个楼层单独图层
        floorsToExport.forEach((fi, idx) => {
            const f = this.floors[fi];
            layers.forEach(([base, color]) => {
                L.push('0','LAYER','2', `${f.name}_${base}`.replace(/\s+/g,'_'), '70','0','62', color, '6','CONTINUOUS');
            });
        });
        L.push('0','ENDTAB','0','ENDSEC');
        L.push('0','SECTION','2','ENTITIES');

        const line = (x1,y1,x2,y2,layer) => {
            L.push('0','LINE','8',layer,
                '10',(x1*MM_PER_UNIT).toFixed(2),'20',(-y1*MM_PER_UNIT).toFixed(2),'30','0',
                '11',(x2*MM_PER_UNIT).toFixed(2),'21',(-y2*MM_PER_UNIT).toFixed(2),'31','0');
        };
        const text = (x,y,h,txt,layer) => {
            L.push('0','TEXT','8',layer,
                '10',(x*MM_PER_UNIT).toFixed(2),'20',(-y*MM_PER_UNIT).toFixed(2),'30','0',
                '40',(h*MM_PER_UNIT).toFixed(2),'1',txt);
        };
        const rotPt = (x,y,cx,cy,deg) => {
            const r = deg*Math.PI/180;
            return [Math.cos(r)*(x-cx)-Math.sin(r)*(y-cy)+cx,
                    Math.sin(r)*(x-cx)+Math.cos(r)*(y-cy)+cy];
        };
        const rectLines = (x,y,w,h,cx,cy,rot,layer) => {
            const pts = [[x,y],[x+w,y],[x+w,y+h],[x,y+h]].map(([px,py])=>rotPt(px,py,cx,cy,rot));
            for (let i=0;i<4;i++) line(pts[i][0],pts[i][1],pts[(i+1)%4][0],pts[(i+1)%4][1],layer);
        };

        // 各楼层水平并排, 间距 gap (mm已转到user-unit)
        const bounds = floorsToExport.map(i => this.getBoundsOf(this.floors[i].objects));
        const gap = 20;
        let cursorX = 0;
        floorsToExport.forEach((fi, idx) => {
            const f = this.floors[fi];
            const b = bounds[idx];
            const offX = cursorX - b.x;
            cursorX += b.w + gap;

            const lay = (base) => `${f.name}_${base}`.replace(/\s+/g,'_');
            // 标题
            text(b.x + offX, b.y - 10, 5, f.name, lay('FLOOR_TITLE'));

            f.objects.forEach(o => {
                if (o.type==='wall') {
                    line(o.x1+offX,o.y1, o.x2+offX,o.y2, lay('WALL'));
                } else if (o.type==='door') {
                    line(o.x1+offX,o.y1, o.x2+offX,o.y2, lay('DOOR'));
                } else if (o.type==='window') {
                    line(o.x1+offX,o.y1, o.x2+offX,o.y2, lay('WINDOW'));
                } else if (o.type==='furniture' || o.type==='stairs') {
                    const cx = o.x+o.w/2, cy = o.y+o.h/2;
                    const layer = lay(o.type==='stairs'?'STAIRS':'FURNITURE');
                    rectLines(o.x+offX,o.y,o.w,o.h, cx+offX,cy, o.rot||0, layer);
                    if (o.name) text(cx+offX - o.w/3, cy, 3, o.name, layer);
                } else if (o.type==='text') {
                    text(o.x+offX, o.y, (o.size||16)/MM_PER_UNIT, o.text||'', lay('TEXT'));
                }
            });

            // 若开启尺寸标注, 简单导出外墙 bbox 总尺寸
            if (this.showDims) {
                const walls = f.objects.filter(o => o.type==='wall');
                if (walls.length > 0) {
                    let mnX=Infinity,mnY=Infinity,mxX=-Infinity,mxY=-Infinity;
                    walls.forEach(w=>{
                        mnX=Math.min(mnX,w.x1,w.x2); mxX=Math.max(mxX,w.x1,w.x2);
                        mnY=Math.min(mnY,w.y1,w.y2); mxY=Math.max(mxY,w.y1,w.y2);
                    });
                    const dl = lay('DIM');
                    const off = 6;
                    // 上方水平
                    line(mnX+offX, mnY-off, mxX+offX, mnY-off, dl);
                    text((mnX+mxX)/2 + offX, mnY-off-2, 4, String(Math.round((mxX-mnX)*MM_PER_UNIT)), dl);
                    // 左侧垂直
                    line(mnX-off+offX, mnY, mnX-off+offX, mxY, dl);
                    text(mnX-off-4+offX, (mnY+mxY)/2, 4, String(Math.round((mxY-mnY)*MM_PER_UNIT)), dl);
                }
            }
        });

        L.push('0','ENDSEC','0','EOF');
        const dxf = L.join('\r\n');
        const blob = new Blob([dxf], {type:'application/dxf'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'floorplan_'+Date.now()+'.dxf';
        a.click();
    },

};

/* ============================================================
   辅助绘制函数
   ============================================================ */
function drawBox(g, o) {
    const ns='http://www.w3.org/2000/svg';
    const r = document.createElementNS(ns,'rect');
    r.setAttribute('x',0); r.setAttribute('y',0);
    r.setAttribute('width',o.w); r.setAttribute('height',o.h);
    r.setAttribute('fill',o.color||'#f5ebd6'); r.setAttribute('stroke','#8a7a5c'); r.setAttribute('stroke-width',1);
    g.appendChild(r);
}
function drawBed(g, o) {
    const ns='http://www.w3.org/2000/svg';
    drawBox(g, o);
    // 枕头 (顶部短边)
    const pil = document.createElementNS(ns,'rect');
    pil.setAttribute('x', o.w*0.1); pil.setAttribute('y', o.h*0.05);
    pil.setAttribute('width', o.w*0.8); pil.setAttribute('height', o.h*0.15);
    pil.setAttribute('fill','#fff'); pil.setAttribute('stroke','#bbb');
    g.appendChild(pil);
    // 被子线
    const q = document.createElementNS(ns,'line');
    q.setAttribute('x1',0); q.setAttribute('y1', o.h*0.25);
    q.setAttribute('x2',o.w); q.setAttribute('y2', o.h*0.25);
    q.setAttribute('stroke','#bbb');
    g.appendChild(q);
}
function drawSofa(g, o) {
    const ns='http://www.w3.org/2000/svg';
    drawBox(g, {...o, color:'#e8d0a8'});
    // 靠背
    const b = document.createElementNS(ns,'rect');
    b.setAttribute('x',0); b.setAttribute('y',0);
    b.setAttribute('width',o.w); b.setAttribute('height',o.h*0.25);
    b.setAttribute('fill','#c9a97a');
    g.appendChild(b);
    // 坐垫分隔
    for (let i=1;i<3;i++) {
        const l = document.createElementNS(ns,'line');
        l.setAttribute('x1', o.w*i/3); l.setAttribute('y1', o.h*0.25);
        l.setAttribute('x2', o.w*i/3); l.setAttribute('y2', o.h);
        l.setAttribute('stroke','#8a7a5c'); l.setAttribute('stroke-width',0.5);
        g.appendChild(l);
    }
}
function drawSofaL(g, o) {
    const ns='http://www.w3.org/2000/svg';
    // L形 (主体+延伸)
    const p = document.createElementNS(ns,'path');
    const t = o.h * 0.4;
    p.setAttribute('d', `M 0 0 L ${o.w} 0 L ${o.w} ${o.h} L ${o.w-t*1.5} ${o.h} L ${o.w-t*1.5} ${t} L 0 ${t} Z`);
    p.setAttribute('fill','#e8d0a8'); p.setAttribute('stroke','#8a7a5c');
    g.appendChild(p);
    // 靠背
    const b = document.createElementNS(ns,'path');
    b.setAttribute('d',`M 0 0 L ${o.w} 0 L ${o.w} ${o.h*0.15} L ${o.w*0.15} ${o.h*0.15} L ${o.w*0.15} ${t} L 0 ${t} Z`);
    b.setAttribute('fill','#c9a97a');
    g.appendChild(b);
}

function distToSeg(p, a, b) {
    const dx = b.x-a.x, dy = b.y-a.y;
    const l2 = dx*dx+dy*dy;
    if (l2 < 1e-6) return Math.hypot(p.x-a.x, p.y-a.y);
    let t = ((p.x-a.x)*dx + (p.y-a.y)*dy) / l2;
    t = Math.max(0, Math.min(1, t));
    return Math.hypot(p.x - (a.x+t*dx), p.y - (a.y+t*dy));
}

}

function escapeXml(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
                        .replace(/"/g,'&quot;').replace(/'/g,'&apos;');
}

(function(){
    const params = new URLSearchParams(location.search);
    if (params.get('autoload') === '1') {
        const raw = localStorage.getItem('fp_autoload');
        if (raw) {
            try {
                const d = JSON.parse(raw);
                app.importData(d);
                app.pushHistory();
                setTimeout(()=>app.zoomFit(), 50);
                localStorage.removeItem('fp_autoload');
            } catch(e) { console.error('autoload failed:', e); }
        }
    }
})();
